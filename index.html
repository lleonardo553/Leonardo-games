                ctx.roundRect(px - 14, py + 8, 28, 20, 4);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Enemy cars
                enemies.forEach(e => {
                    const ex = e.lane * laneW + laneW / 2;
                    ctx.fillStyle = '#e84393';
                    ctx.shadowBlur = 10; ctx.shadowColor = '#e84393';
                    ctx.beginPath();
                    ctx.roundRect(ex - 18, e.y, 36, 55, 8);
                    ctx.fill();
                    ctx.fillStyle = '#fd79a8';
                    ctx.beginPath();
                    ctx.roundRect(ex - 14, e.y + 30, 28, 18, 4);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 24px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText('Crash!', W/2, H/2 - 20);
                    ctx.font = '16px Poppins';
                    ctx.fillText(`Distance: ${score}`, W/2, H/2 + 15);
                }
            }

            function loop() {
                update(); draw();
                if (!gameOver) gameAnimFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // ===================== GAME: BASKETBALL =====================
        function startBasketball(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;

            let hoopX = W / 2;
            let hoopY = 140;
            let ball = null;
            let score = 0;
            let shots = 0;
            let maxShots = 15;
            let gameOver = false;
            let dragStart = null;
            let particles = [];

            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (gameOver) { startBasketball(canvas); return; }
                if (ball) return;
                const rect = canvas.getBoundingClientRect();
                dragStart = { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
            };

            canvas.ontouchend = (e) => {
                e.preventDefault();
                if (!dragStart || ball || gameOver) return;
                const rect = canvas.getBoundingClientRect();
                const endX = e.changedTouches[0].clientX - rect.left;
                const endY = e.changedTouches[0].clientY - rect.top;
                const vx = (endX - dragStart.x) * 0.08;
                const vy = (endY - dragStart.y) * 0.08;

                ball = { x: dragStart.x, y: dragStart.y, vx: vx, vy: Math.min(vy, -3), r: 16 };
                shots++;
                dragStart = null;

                // Move hoop
                hoopX = 40 + Math.random() * (W - 80);
            };

            function update() {
                if (gameOver) return;

                if (ball) {
                    ball.vy += 0.3;
                    ball.x += ball.vx;
                    ball.y += ball.vy;

                    // Check hoop
                    if (ball.y < hoopY + 10 && ball.y > hoopY - 10 && Math.abs(ball.x - hoopX) < 25 && ball.vy > 0) {
                        score++;
                        for (let i = 0; i < 10; i++) {
                            particles.push({
                                x: hoopX, y: hoopY,
                                vx: (Math.random() - 0.5) * 6,
                                vy: (Math.random() - 0.5) * 6,
                                life: 30,
                                color: ['#fdcb6e', '#e17055', '#6c5ce7'][Math.floor(Math.random() * 3)]
                            });
                        }
                    }

                    if (ball.y > H + 50 || ball.x < -50 || ball.x > W + 50) {
                        ball = null;
                        if (shots >= maxShots) {
                            gameOver = true;
                            showToast(`🏀 Basketball: ${score}/${maxShots} cestas!`);
                        }
                    }
                }

                particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
                particles = particles.filter(p => p.life > 0);

                document.getElementById('gameScore').textContent = `🏀 ${score} | ${maxShots - shots} left`;
            }

            function draw() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);

                // Backboard
                ctx.fillStyle = 'rgba(108,92,231,0.3)';
                ctx.fillRect(hoopX - 35, hoopY - 40, 70, 50);
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.strokeRect(hoopX - 20, hoopY - 25, 40, 30);

                // Hoop
                ctx.strokeStyle = '#e17055';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(hoopX, hoopY, 22, 0, Math.PI);
                ctx.stroke();

                // Net
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 1;
                for (let i = 0; i < 5; i++) {
                    ctx.beginPath();
                    ctx.moveTo(hoopX - 20 + i * 10, hoopY);
                    ctx.lineTo(hoopX - 10 + i * 5, hoopY + 30);
                    ctx.stroke();
                }

                // Ball
                if (ball) {
                    ctx.fillStyle = '#e17055';
                    ctx.shadowBlur = 12; ctx.shadowColor = '#e17055';
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                }

                // Particles
                particles.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / 30;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;

                // Drag indicator
                if (!ball && !gameOver) {
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.font = '14px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText('Arraste para atirar 🏀', W/2, H - 40);
                }

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 24px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText('Fim de Jogo!', W/2, H/2 - 20);
                    ctx.font = '16px Poppins';
                    ctx.fillText(`Cestas: ${score}/${maxShots}`, W/2, H/2 + 15);
                }
            }

            function loop() {
                update(); draw();
                if (!gameOver) gameAnimFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // ===================== GAME: MEMORY CARDS =====================
        function startMemory(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const cols = 4, rows = 4;
            const total = cols * rows;
            const cardW = (W - 40) / cols;
            const cardH = cardW * 1.2;
            const offsetX = 20;
            const offsetY = (H - rows * cardH - (rows - 1) * 8) / 2;

            const emojis = ['🐶','🐱','🐼','🦊','🐸','🐵','🐰','🐻'];
            let deck = [...emojis, ...emojis];
            deck = shuffleArray(deck);

            let cards = deck.map((emoji, i) => ({
                emoji,
                col: i % cols,
                row: Math.floor(i / cols),
                flipped: false,
                matched: false
            }));

            let flippedCards = [];
            let score = 0;
            let moves = 0;
            let locked = false;
            let gameOver = false;

            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (locked || gameOver) {
                    if (gameOver) startMemory(canvas);
                    return;
                }
                const rect = canvas.getBoundingClientRect();
                const tx = e.touches[0].clientX - rect.left - offsetX;
                const ty = e.touches[0].clientY - rect.top - offsetY;
                const col = Math.floor(tx / (cardW + 4));
                const row = Math.floor(ty / (cardH + 8));

                if (col < 0 || col >= cols || row < 0 || row >= rows) return;
                const card = cards[row * cols + col];
                if (card.flipped || card.matched) return;

                card.flipped = true;
                flippedCards.push(card);

                if (flippedCards.length === 2) {
                    moves++;
                    locked = true;
                    setTimeout(() => {
                        if (flippedCards[0].emoji === flippedCards[1].emoji) {
                            flippedCards[0].matched = true;
                            flippedCards[1].matched = true;
                            score++;
                        } else {
                            flippedCards[0].flipped = false;
                            flippedCards[1].flipped = false;
                        }
                        flippedCards = [];
                        locked = false;

                        if (cards.every(c => c.matched)) {
                            gameOver = true;
                            showToast(`🃏 Memory: ${moves} movimentos!`);
                        }

                        draw();
                    }, 700);
                }
                draw();
            };

            function draw() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);

                document.getElementById('gameScore').textContent = `🃏 ${score}/${emojis.length} | Moves: ${moves}`;

                cards.forEach(card => {
                    const x = offsetX + card.col * (cardW + 4);
                    const y = offsetY + card.row * (cardH + 8);

                    if (card.flipped || card.matched) {
                        ctx.fillStyle = card.matched ? 'rgba(0,184,148,0.3)' : 'rgba(108,92,231,0.2)';
                        ctx.beginPath();
                        ctx.roundRect(x, y, cardW - 4, cardH, 10);
                        ctx.fill();
                        ctx.strokeStyle = card.matched ? '#00b894' : '#6c5ce7';
                        ctx.lineWidth = 2;
                        ctx.stroke();

                        ctx.font = `${Math.min(cardW, cardH) * 0.4}px serif`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(card.emoji, x + (cardW - 4) / 2, y + cardH / 2);
                    } else {
                        ctx.fillStyle = '#6c5ce7';
                        ctx.shadowBlur = 5; ctx.shadowColor = '#6c5ce7';
                        ctx.beginPath();
                        ctx.roundRect(x, y, cardW - 4, cardH, 10);
                        ctx.fill();
                        ctx.shadowBlur = 0;

                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.font = 'bold 20px Poppins';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('?', x + (cardW - 4) / 2, y + cardH / 2);
                    }
                });

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 24px Poppins';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🎉 Parabéns!', W/2, H/2 - 20);
                    ctx.font = '16px Poppins';
                    ctx.fillText(`${moves} movimentos`, W/2, H/2 + 15);
                }
            }

            draw();
        }

        // ===================== GAME: TETRIS =====================
        function startTetris(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const cols = 10;
            const cellSize = Math.floor(W / cols);
            const rows = Math.floor(H / cellSize);
            const offsetX = (W - cols * cellSize) / 2;

            let grid = Array.from({ length: rows }, () => Array(cols).fill(null));
            let score = 0;
            let gameOver = false;

            const shapes = [
                { blocks: [[0,0],[1,0],[2,0],[3,0]], color: '#00cec9' },
                { blocks: [[0,0],[1,0],[0,1],[1,1]], color: '#fdcb6e' },
                { blocks: [[0,0],[1,0],[2,0],[1,1]], color: '#a855f7' },
                { blocks: [[0,0],[1,0],[2,0],[2,1]], color: '#e17055' },
                { blocks: [[0,0],[1,0],[2,0],[0,1]], color: '#0984e3' },
                { blocks: [[0,0],[1,0],[1,1],[2,1]], color: '#00b894' },
                { blocks: [[1,0],[2,0],[0,1],[1,1]], color: '#e84393' },
            ];

            let current = spawnPiece();
            let dropTimer = 0;
            let dropSpeed = 30;

            function spawnPiece() {
                const s = shapes[Math.floor(Math.random() * shapes.length)];
                return {
                    blocks: s.blocks.map(b => [...b]),
                    color: s.color,
                    x: Math.floor(cols / 2) - 1,
                    y: 0
                };
            }

            function canMove(piece, dx, dy) {
                return piece.blocks.every(([bx, by]) => {
                    const nx = piece.x + bx + dx;
                    const ny = piece.y + by + dy;
                    return nx >= 0 && nx < cols && ny < rows && (ny < 0 || !grid[ny][nx]);
                });
            }

            function placePiece() {
                current.blocks.forEach(([bx, by]) => {
                    const ny = current.y + by;
                    const nx = current.x + bx;
                    if (ny >= 0 && ny < rows) grid[ny][nx] = current.color;
                });

                // Clear lines
                for (let r = rows - 1; r >= 0; r--) {
                    if (grid[r].every(c => c)) {
                        grid.splice(r, 1);
                        grid.unshift(Array(cols).fill(null));
                        score += 100;
                        r++;
                    }
                }

                current = spawnPiece();
                if (!canMove(current, 0, 0)) {
                    gameOver = true;
                    showToast(`🟦 Tetris: ${score} pontos!`);
                }
            }

            // Touch controls
            let touchX;
            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (gameOver) { startTetris(canvas); return; }
                touchX = e.touches[0].clientX;
            };
            canvas.ontouchend = (e) => {
                e.preventDefault();
                if (gameOver) return;
                const dx = e.changedTouches[0].clientX - touchX;
                const dy = e.changedTouches[0].clientY - (e.changedTouches[0].clientY); // unused but kept

                if (Math.abs(dx) < 15) {
                    // Tap - rotate
                    const rotated = current.blocks.map(([bx, by]) => [-by, bx]);
                    const minX = Math.min(...rotated.map(b => b[0]));
                    const adjusted = rotated.map(([bx, by]) => [bx - minX, by - Math.min(...rotated.map(b => b[1]))]);
                    const oldBlocks = current.blocks;
                    current.blocks = adjusted;
                    if (!canMove(current, 0, 0)) current.blocks = oldBlocks;
                } else if (dx > 15 && canMove(current, 1, 0)) {
                    current.x++;
                } else if (dx < -15 && canMove(current, -1, 0)) {
                    current.x--;
                }
            };

            // Double tap to drop
            canvas.ondblclick = (e) => {
                if (gameOver) return;
                while (canMove(current, 0, 1)) current.y++;
                placePiece();
            };

            function update() {
                if (gameOver) return;
                dropTimer++;
                if (dropTimer >= dropSpeed) {
                    dropTimer = 0;
                    if (canMove(current, 0, 1)) {
                        current.y++;
                    } else {
                        placePiece();
                    }
                }
                document.getElementById('gameScore').textContent = `🟦 ${score}`;
            }

            function draw() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);

                // Grid
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const x = offsetX + c * cellSize;
                        const y = r * cellSize;
                        if (grid[r][c]) {
                            ctx.fillStyle = grid[r][c];
                            ctx.beginPath();
                            ctx.roundRect(x + 1, y + 1, cellSize - 2, cellSize - 2, 3);
                            ctx.fill();
                        } else {
                            ctx.strokeStyle = 'rgba(108,92,231,0.08)';
                            ctx.strokeRect(x, y, cellSize, cellSize);
                        }
                    }
                }

                // Current piece
                if (!gameOver) {
                    current.blocks.forEach(([bx, by]) => {
                        const x = offsetX + (current.x + bx) * cellSize;
                        const y = (current.y + by) * cellSize;
                        ctx.fillStyle = current.color;
                        ctx.shadowBlur = 5; ctx.shadowColor = current.color;
                        ctx.beginPath();
                        ctx.roundRect(x + 1, y + 1, cellSize - 2, cellSize - 2, 3);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    });
                }

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 24px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText('Game Over!', W/2, H/2 - 20);
                    ctx.font = '16px Poppins';
                    ctx.fillText(`Score: ${score}`, W/2, H/2 + 15);
                }
            }

            function loop() {
                update(); draw();
                if (!gameOver) gameAnimFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // ===================== GAME: 2048 =====================
        function start2048(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const gridSize = 4;
            const padding = 12;
            const totalPad = padding * (gridSize + 1);
            const cellSize = (Math.min(W, H * 0.7) - totalPad) / gridSize;
            const boardSize = cellSize * gridSize + totalPad;
            const offsetX = (W - boardSize) / 2;
            const offsetY = (H - boardSize) / 2;

            let grid = Array.from({ length: gridSize }, () => Array(gridSize).fill(0));
            let score = 0;
            let gameOver = false;

            addTile();
            addTile();

            const tileColors = {
                0: '#1a1a2e', 2: '#6c5ce7', 4: '#a855f7', 8: '#e84393',
                16: '#fd79a8', 32: '#e17055', 64: '#d63031', 128: '#fdcb6e',
                256: '#f39c12', 512: '#00b894', 1024: '#00cec9', 2048: '#0984e3'
            };

            function addTile() {
                const empty = [];
                grid.forEach((row, r) => row.forEach((v, c) => { if (!v) empty.push([r, c]); }));
                if (empty.length === 0) return;
                const [r, c] = empty[Math.floor(Math.random() * empty.length)];
                grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            }

            function slide(row) {
                let arr = row.filter(v => v);
                let merged = [];
                for (let i = 0; i < arr.length; i++) {
                    if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
                        merged.push(arr[i] * 2);
                        score += arr[i] * 2;
                        i++;
                    } else {
                        merged.push(arr[i]);
                    }
                }
                while (merged.length < gridSize) merged.push(0);
                return merged;
            }

            function move(dir) {
                let moved = false;
                const oldGrid = grid.map(r => [...r]);

                if (dir === 'left') {
                    grid = grid.map(row => slide(row));
                } else if (dir === 'right') {
                    grid = grid.map(row => slide([...row].reverse()).reverse());
                } else if (dir === 'up') {
                    for (let c = 0; c < gridSize; c++) {
                        let col = grid.map(row => row[c]);
                        col = slide(col);
                        col.forEach((v, r) => grid[r][c] = v);
                    }
                } else if (dir === 'down') {
                    for (let c = 0; c < gridSize; c++) {
                        let col = grid.map(row => row[c]).reverse();
                        col = slide(col).reverse();
                        col.forEach((v, r) => grid[r][c] = v);
                    }
                }

                if (JSON.stringify(oldGrid) !== JSON.stringify(grid)) {
                    addTile();
                    moved = true;
                }

                // Check game over
                if (!grid.some(row => row.includes(0))) {
                    let canMerge = false;
                    for (let r = 0; r < gridSize; r++) {
                        for (let c = 0; c < gridSize; c++) {
                            if (c + 1 < gridSize && grid[r][c] === grid[r][c + 1]) canMerge = true;
                            if (r + 1 < gridSize && grid[r][c] === grid[r + 1][c]) canMerge = true;
                        }
                    }
                    if (!canMerge) {
                        gameOver = true;
                        showToast(`🔢 2048: ${score} pontos!`);
                    }
                }

                draw();
            }

            let startTouchX, startTouchY;
            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (gameOver) { start2048(canvas); return; }
                startTouchX = e.touches[0].clientX;
                startTouchY = e.touches[0].clientY;
            };
            canvas.ontouchend = (e) => {
                e.preventDefault();
                if (gameOver) return;
                const dx = e.changedTouches[0].clientX - startTouchX;
                const dy = e.changedTouches[0].clientY - startTouchY;
                if (Math.abs(dx) > Math.abs(dy)) {
                    move(dx > 0 ? 'right' : 'left');
                } else {
                    move(dy > 0 ? 'down' : 'up');
                }
            };

            function draw() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);

                document.getElementById('gameScore').textContent = `🔢 ${score}`;

                // Board bg
                ctx.fillStyle = 'rgba(108,92,231,0.1)';
                ctx.beginPath();
                ctx.roundRect(offsetX, offsetY, boardSize, boardSize, 12);
                ctx.fill();

                for (let r = 0; r < gridSize; r++) {
                    for (let c = 0; c < gridSize; c++) {
                        const x = offsetX + padding + c * (cellSize + padding);
                        const y = offsetY + padding + r * (cellSize + padding);
                        const val = grid[r][c];

                        ctx.fillStyle = tileColors[val] || '#0984e3';
                        if (val > 0) {
                            ctx.shadowBlur = 5;
                            ctx.shadowColor = tileColors[val] || '#0984e3';
                        }
                        ctx.beginPath();
                        ctx.roundRect(x, y, cellSize, cellSize, 8);
                        ctx.fill();
                        ctx.shadowBlur = 0;

                        if (val > 0) {
                            ctx.fillStyle = 'white';
                            ctx.font = `bold ${val >= 1000 ? 16 : val >= 100 ? 20 : 24}px Poppins`;
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'middle';
                            ctx.fillText(val, x + cellSize / 2, y + cellSize / 2);
                        }
                    }
                }

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 24px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText('Game Over!', W/2, H/2 - 20);
                    ctx.font = '16px Poppins';
                    ctx.fillText(`Score: ${score}`, W/2, H/2 + 15);
                }
            }

            draw();
        }

        // ===================== GENERIC GAME =====================
        function startGenericGame(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const game = allGames.find(g => g.id === currentGameId);

            let particles = [];
            let score = 0;
            let gameOver = false;
            let frame = 0;

            // Tap to score game
            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (gameOver) { startGenericGame(canvas); return; }
                const rect = canvas.getBoundingClientRect();
                const tx = e.touches[0].clientX - rect.left;
                const ty = e.touches[0].clientY - rect.top;
                score++;

                for (let i = 0; i < 8; i++) {
                    particles.push({
                        x: tx, y: ty,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8,
                        life: 40,
                        color: ['#6c5ce7', '#e84393', '#00cec9', '#fdcb6e'][Math.floor(Math.random() * 4)]
                    });
                }

                if (score >= 50) {
                    gameOver = true;
                    showToast(`${game?.emoji || '🎮'} ${game?.title || 'Game'}: Você venceu!`);
                }
            };

            function update() {
                if (gameOver) return;
                frame++;
                particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                    p.life--;
                });
                particles = particles.filter(p => p.life > 0);
                document.getElementById('gameScore').textContent = `${game?.emoji || '🎮'} ${score}/50`;
            }

            function draw() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);

                // Animated background circles
                for (let i = 0; i < 5; i++) {
                    ctx.fillStyle = `rgba(108, 92, 231, ${0.03 + Math.sin(frame * 0.02 + i) * 0.02})`;
                    const radius = 50 + i * 30 + Math.sin(frame * 0.01 + i) * 20;
                    ctx.beginPath();
                    ctx.arc(W / 2, H / 2, radius, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Emoji
                ctx.font = '60px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(game?.emoji || '🎮', W / 2, H / 2 - 20);

                ctx.fillStyle = 'white';
                ctx.font = 'bold 18px Poppins';
                ctx.fillText('Toque para pontuar!', W / 2, H / 2 + 40);

                ctx.font = '14px Poppins';
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fillText(`${score}/50 - ${game?.title || 'Game'}`, W / 2, H / 2 + 65);

                // Progress bar
                const barW = W * 0.6;
                const barH = 8;
                const barX = (W - barW) / 2;
                const barY = H / 2 + 85;
                ctx.fillStyle = 'rgba(108,92,231,0.2)';
                ctx.beginPath();
                ctx.roundRect(barX, barY, barW, barH, 4);
                ctx.fill();
                ctx.fillStyle = '#6c5ce7';
                ctx.beginPath();
                ctx.roundRect(barX, barY, barW * (score / 50), barH, 4);
                ctx.fill();

                // Particles
                particles.forEach(p => {
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life / 40;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 28px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText('🎉 Parabéns!', W/2, H/2 - 10);
                    ctx.font = '14px Poppins';
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fillText('Toque para jogar novamente', W/2, H/2 + 30);
                }
            }

            function loop() {
                update(); draw();
                if (!gameOver) gameAnimFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // ===================== UTILS =====================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Polyfill roundRect
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
                this.moveTo(x + r.tl, y);
                this.lineTo(x + w - r.tr, y);
                this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                this.lineTo(x + w, y + h - r.br);
                this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                this.lineTo(x + r.bl, y + h);
                this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                this.lineTo(x, y + r.tl);
                this.quadraticCurveTo(x, y, x + r.tl, y);
                this.closePath();
                return this;
            };
        }
    </script>
