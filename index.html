<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎮 PlayZone - Jogos Online Grátis</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #6c5ce7;
            --primary-dark: #5a4bd1;
            --secondary: #00cec9;
            --accent: #fd79a8;
            --bg-dark: #0a0a1a;
            --bg-card: #151530;
            --bg-card-hover: #1e1e45;
            --text: #ffffff;
            --text-muted: #a0a0c0;
            --gradient-1: linear-gradient(135deg, #6c5ce7, #a855f7);
            --gradient-2: linear-gradient(135deg, #00cec9, #0984e3);
            --gradient-3: linear-gradient(135deg, #fd79a8, #e84393);
            --gradient-4: linear-gradient(135deg, #fdcb6e, #e17055);
            --gradient-5: linear-gradient(135deg, #55a3f7, #6c5ce7);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(108, 92, 231, 0.2);
            padding: 12px 16px;
            transition: transform 0.3s ease;
        }

        .header.hidden {
            transform: translateY(-100%);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 22px;
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-icon {
            font-size: 28px;
            -webkit-text-fill-color: initial;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            border: 1px solid rgba(108, 92, 231, 0.3);
            background: rgba(108, 92, 231, 0.1);
            color: var(--text);
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .icon-btn:active {
            transform: scale(0.9);
        }

        .icon-btn .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            background: var(--accent);
            border-radius: 50%;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(108, 92, 231, 0.2);
            border-radius: 14px;
            padding: 10px 16px;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .search-bar:focus-within {
            border-color: var(--primary);
            background: rgba(108, 92, 231, 0.1);
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.15);
        }

        .search-bar input {
            flex: 1;
            background: none;
            border: none;
            color: var(--text);
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            outline: none;
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            color: var(--text-muted);
            font-size: 16px;
        }

        /* Main Content */
        .main-content {
            padding-top: 120px;
            padding-bottom: 80px;
        }

        /* Categories Scroll */
        .categories-scroll {
            display: flex;
            gap: 8px;
            padding: 0 16px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            margin-bottom: 20px;
        }

        .categories-scroll::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            flex-shrink: 0;
            padding: 8px 18px;
            border-radius: 25px;
            border: 1px solid rgba(108, 92, 231, 0.3);
            background: rgba(108, 92, 231, 0.1);
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-family: 'Poppins', sans-serif;
        }

        .category-chip:active {
            transform: scale(0.95);
        }

        .category-chip.active {
            background: var(--gradient-1);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        /* Featured Banner */
        .featured-section {
            padding: 0 16px;
            margin-bottom: 24px;
        }

        .featured-banner {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            height: 200px;
            cursor: pointer;
        }

        .featured-banner .banner-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .banner-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.1) 100%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
        }

        .banner-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--accent);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            width: fit-content;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .banner-title {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .banner-desc {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }

        .banner-dots {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-top: 12px;
        }

        .banner-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .banner-dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 4px;
        }

        /* Section */
        .section {
            margin-bottom: 28px;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            margin-bottom: 14px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title .emoji {
            font-size: 20px;
        }

        .see-all {
            color: var(--primary);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: none;
            font-family: 'Poppins', sans-serif;
        }

        /* Horizontal Game List */
        .games-scroll {
            display: flex;
            gap: 12px;
            padding: 0 16px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .games-scroll::-webkit-scrollbar {
            display: none;
        }

        .game-card-h {
            flex-shrink: 0;
            width: 140px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .game-card-h:active {
            transform: scale(0.95);
        }

        .game-thumb {
            width: 140px;
            height: 140px;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
            margin-bottom: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .game-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .game-card-h:hover .game-thumb img {
            transform: scale(1.05);
        }

        .game-thumb .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(108, 92, 231, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .game-card-h:hover .play-overlay {
            opacity: 1;
        }

        .play-btn-icon {
            width: 44px;
            height: 44px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .game-rating {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .game-new-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--gradient-3);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .game-title {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .game-category {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Grid Games */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 0 16px;
        }

        .game-card-grid {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .game-card-grid:active {
            transform: scale(0.93);
        }

        .game-card-grid .game-thumb {
            width: 100%;
            height: 0;
            padding-bottom: 100%;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            margin-bottom: 6px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .game-card-grid .game-thumb img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-card-grid .game-title {
            font-size: 11px;
            font-weight: 600;
            text-align: center;
        }

        /* Large Game Card */
        .games-large {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding: 0 16px;
        }

        .game-card-large {
            display: flex;
            gap: 14px;
            background: var(--bg-card);
            border-radius: 18px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(108, 92, 231, 0.1);
        }

        .game-card-large:active {
            transform: scale(0.98);
            background: var(--bg-card-hover);
        }

        .game-card-large .thumb {
            width: 80px;
            height: 80px;
            border-radius: 14px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .game-card-large .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-card-large .info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .game-card-large .info .title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .game-card-large .info .desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .game-card-large .info .meta {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .game-card-large .info .meta span {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .game-card-large .play-btn {
            align-self: center;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: var(--gradient-1);
            border: none;
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        /* Quick Play Section */
        .quick-play-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 0 16px;
        }

        .quick-card {
            position: relative;
            border-radius: 18px;
            overflow: hidden;
            height: 180px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .quick-card:active {
            transform: scale(0.96);
        }

        .quick-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .quick-card .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 14px;
        }

        .quick-card .overlay .title {
            font-size: 14px;
            font-weight: 700;
        }

        .quick-card .overlay .cat {
            font-size: 11px;
            color: rgba(255,255,255,0.6);
        }

        .quick-card .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background: rgba(108, 92, 231, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .quick-card:hover .play-icon {
            opacity: 1;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 16px;
            margin: 0 16px 24px;
            background: var(--bg-card);
            border-radius: 18px;
            border: 1px solid rgba(108, 92, 231, 0.15);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 20px;
            font-weight: 800;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 10, 26, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(108, 92, 231, 0.2);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
            border: none;
            background: none;
            color: var(--text-muted);
            font-family: 'Poppins', sans-serif;
        }

        .nav-item:active {
            transform: scale(0.9);
        }

        .nav-item.active {
            color: var(--primary);
        }

        .nav-item .nav-icon {
            font-size: 22px;
            line-height: 1;
        }

        .nav-item .nav-label {
            font-size: 10px;
            font-weight: 600;
        }

        .nav-item.active .nav-icon-bg {
            background: rgba(108, 92, 231, 0.15);
            padding: 6px 20px;
            border-radius: 20px;
        }

        /* Game Modal */
        .game-modal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: var(--bg-dark);
            display: none;
            flex-direction: column;
        }

        .game-modal.active {
            display: flex;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(10, 10, 26, 0.95);
            border-bottom: 1px solid rgba(108, 92, 231, 0.2);
        }

        .modal-back {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid rgba(108, 92, 231, 0.3);
            background: rgba(108, 92, 231, 0.1);
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .modal-game-title {
            flex: 1;
            font-size: 16px;
            font-weight: 700;
        }

        .modal-fullscreen {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: 1px solid rgba(108, 92, 231, 0.3);
            background: rgba(108, 92, 231, 0.1);
            color: white;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
            overflow: auto;
        }

        .game-canvas-wrapper {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 9/14;
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 40px rgba(108, 92, 231, 0.2);
        }

        .game-canvas-wrapper canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .game-score {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .game-overlay-screen {
            position: absolute;
            inset: 0;
            background: rgba(10, 10, 26, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            gap: 16px;
        }

        .game-overlay-screen h2 {
            font-size: 28px;
            font-weight: 900;
        }

        .game-overlay-screen p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .play-game-btn {
            padding: 14px 40px;
            border-radius: 16px;
            background: var(--gradient-1);
            border: none;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.5);
            transition: transform 0.2s;
        }

        .play-game-btn:active {
            transform: scale(0.95);
        }

        /* Loading */
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(108, 92, 231, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.5s ease forwards;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .pulse {
            animation: pulse 2s ease infinite;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid rgba(108, 92, 231, 0.3);
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            z-index: 3000;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Favorites heart animation */
        @keyframes heartBeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
            75% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .heart-beat {
            animation: heartBeat 0.6s ease;
        }

        /* Dark gradient bg elements */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            z-index: -1;
        }

        .bg-orb-1 {
            width: 300px;
            height: 300px;
            background: var(--primary);
            top: -100px;
            right: -100px;
        }

        .bg-orb-2 {
            width: 250px;
            height: 250px;
            background: var(--accent);
            bottom: 200px;
            left: -100px;
        }

        .bg-orb-3 {
            width: 200px;
            height: 200px;
            background: var(--secondary);
            top: 50%;
            right: -50px;
        }

        /* Mini-game specific styles */
        .game-controls {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .game-control-btn {
            padding: 12px 28px;
            border-radius: 14px;
            border: 1px solid rgba(108, 92, 231, 0.3);
            background: rgba(108, 92, 231, 0.15);
            color: white;
            font-size: 20px;

        // ===================== SCROLL HEADER HIDE =====================

            const header = document.getElementById('header');
            window.addEventListener('scroll', () => {
                const currentY = window.scrollY;
                if (currentY > lastScrollY && currentY > 130) {
                    header.classList.add('hidden');
                } else {
                    header.classList.remove('hidden');
                }
                lastScrollY = currentY;
            });
        }

        function renderBanner() {
            const game = featuredGames[currentBanner];
            document.getElementById('bannerTitle').textContent = game.title;
            document.getElementById('bannerDesc').textContent = game.desc;
            const bg = document.getElementById('bannerBg');
            bg.style.background = game.gradient;
            bg.textContent = '';
            bg.style.display = 'flex';
            bg.style.alignItems = 'center';
            bg.style.justifyContent = 'center';
            bg.style.fontSize = '80px';
            bg.textContent = game.emoji;
            updateBannerDots();
        }

        function renderBannerDots() {
            const container = document.getElementById('bannerDots');
            container.innerHTML = '';
            featuredGames.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'banner-dot' + (i === currentBanner ? ' active' : '');
                dot.onclick = () => { currentBanner = i; renderBanner(); };
                container.appendChild(dot);
            });
        }

        function updateBannerDots() {
            document.querySelectorAll('.banner-dot').forEach((d, i) => {
                d.classList.toggle('active', i === currentBanner);
            });
        }

        function startBannerAutoPlay() {
            setInterval(() => {
                currentBanner = (currentBanner + 1) % featuredGames.length;
                renderBanner();
            }, 4000);
        }

        function renderHomeSections() {
            const container = document.getElementById('gamesSections');
            container.innerHTML = '';

            // Trending Now - horizontal scroll

            // Quick Play - 2 col grid
            container.innerHTML += renderQuickPlaySection('⚡ Jogo Rápido', shuffleArray([...allGames]).slice(0, 4));

            // New Games
            container.innerHTML += renderHorizontalSection('✨ Novos Jogos', allGames.filter(g => g.isNew));

            // Puzzle games
            container.innerHTML += renderHorizontalSection('🧩 Puzzle', allGames.filter(g => g.cat === 'puzzle'));

            // All Games Grid
            container.innerHTML += renderGridSection('🎮 Todos os Jogos', allGames);

            // Top Rated - list style
            container.innerHTML += renderListSection('⭐ Mais Bem Avaliados', [...allGames].sort((a, b) => b.rating - a.rating).slice(0, 8));

            // Arcade
            container.innerHTML += renderHorizontalSection('👾 Arcade', allGames.filter(g => g.cat === 'arcade'));

            // Action
            container.innerHTML += renderHorizontalSection('⚔️ Ação', allGames.filter(g => g.cat === 'action'));

        function renderHorizontalSection(title, games) {
            if (games.length === 0) return '';

                    <button class="see-all" onclick="showToast('Mostrando todos!')">Ver todos →</button>

                <div class="games-scroll">`;
            games.forEach(g => {
                html += `<div class="game-card-h" onclick="openGame(allGames.find(x=>x.id==='${g.id}'))">
                    <div class="game-thumb" style="background:${g.gradient}; display:flex; align-items:center; justify-content:center; font-size:50px;">
                        ${g.emoji}
                        <div class="game-rating">⭐ ${g.rating}</div>
                        ${g.isNew ? '<div class="game-new-badge">NEW</div>' : ''}

                    </div>
                    <div class="game-title">${g.title}</div>
                    <div class="game-category">${getCatName(g.cat)}</div>
                </div>`;
            });
            html += '</div></div>';
            return html;
        }

                    <div class="game-title">${g.title}</div>

            html += '</div></div>';
            return html;

        function startCurrentGame() {
            const overlay = document.getElementById('gameOverlayScreen');

                case 'memory': startMemory(canvas); break;
                case '2048': start2048(canvas); break;
                case 'dino': startDino(canvas); break;
                case 'tictactoe': startTicTacToe(canvas); break;
                case 'whackamole': startWhackAMole(canvas); break;
                case 'balloon': startBalloonPop(canvas); break;
                case 'stacktower': startStackTower(canvas); break;

        // ===================== GAME: SNAKE =====================
        function startSnake(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const gridSize = 20;
            const cols = Math.floor(W / gridSize);
            const rows = Math.floor(H / gridSize);

            let snake = [{ x: Math.floor(cols / 2), y: Math.floor(rows / 2) }];
            let dir = { x: 0, y: -1 };
            let food = spawnFood();
            let score = 0;
            let gameOver = false;
            let speed = 120;

            function spawnFood() {
                let f;
                do {
                    f = { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) };
                } while (snake.some(s => s.x === f.x && s.y === f.y));
                return f;
            }

            // Touch controls
            let touchStartX, touchStartY;
            canvas.ontouchstart = (e) => {
                e.preventDefault();
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            };
            canvas.ontouchmove = (e) => e.preventDefault();
            canvas.ontouchend = (e) => {
                e.preventDefault();
                if (gameOver) { startSnake(canvas); return; }
                const dx = e.changedTouches[0].clientX - touchStartX;
                const dy = e.changedTouches[0].clientY - touchStartY;
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (dx > 20 && dir.x !== -1) dir = { x: 1, y: 0 };
                    else if (dx < -20 && dir.x !== 1) dir = { x: -1, y: 0 };
                } else {
                    if (dy > 20 && dir.y !== -1) dir = { x: 0, y: 1 };
                    else if (dy < -20 && dir.y !== 1) dir = { x: 0, y: -1 };
                }
            };

            function update() {
                if (gameOver) return;
                const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

                if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows || snake.some(s => s.x === head.x && s.y === head.y)) {
                    gameOver = true;
                    document.getElementById('gameScore').textContent = `Game Over! Score: ${score}`;
                    showToast(`🐍 Snake: ${score} pontos!`);
                    return;
                }

                snake.unshift(head);
                if (head.x === food.x && head.y === food.y) {
                    score += 10;
                    food = spawnFood();
                    if (speed > 60) speed -= 2;
                } else {
                    snake.pop();
                }
                document.getElementById('gameScore').textContent = `🐍 ${score}`;
            }

            function draw() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);

                // Grid
                ctx.strokeStyle = 'rgba(108,92,231,0.05)';
                for (let i = 0; i < cols; i++) {
                    for (let j = 0; j < rows; j++) {
                        ctx.strokeRect(i * gridSize, j * gridSize, gridSize, gridSize);
                    }
                }

                // Food
                ctx.fillStyle = '#ff6b6b';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff6b6b';
                ctx.beginPath();
                ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Snake
                snake.forEach((s, i) => {
                    const hue = (120 + i * 3) % 360;
                    ctx.fillStyle = i === 0 ? '#6c5ce7' : `hsl(${hue}, 70%, 50%)`;
                    ctx.shadowBlur = i === 0 ? 10 : 0;
                    ctx.shadowColor = '#6c5ce7';
                    const r = 4;
                    const x = s.x * gridSize + 1;
                    const y = s.y * gridSize + 1;
                    const w = gridSize - 2;
                    const h = gridSize - 2;
                    ctx.beginPath();
                    ctx.roundRect(x, y, w, h, r);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 28px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText('Game Over!', W/2, H/2 - 20);
                    ctx.font = '16px Poppins';
                    ctx.fillText(`Score: ${score}`, W/2, H/2 + 15);
                    ctx.fillStyle = 'rgba(108,92,231,0.5)';
                    ctx.font = '14px Poppins';
                    ctx.fillText('Toque para reiniciar', W/2, H/2 + 50);
                }
            }

            gameInterval = setInterval(() => { update(); draw(); }, speed);
            // Adjust speed dynamically
            function gameLoop() {
                if (gameOver) return;
                clearInterval(gameInterval);
                gameInterval = setInterval(() => { update(); draw(); }, speed);
            }
            draw();
        }

        // ===================== GAME: FLAPPY =====================
        function startFlappy(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;

            let bird = { x: W * 0.25, y: H / 2, vy: 0, r: 16 };
            let pipes = [];
            let score = 0;
            let gameOver = false;
            let frame = 0;
            const gravity = 0.4;
            const jumpForce = -7;
            const pipeWidth = 50;
            const gap = 160;
            const pipeSpeed = 2.5;

            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (gameOver) { startFlappy(canvas); return; }
                bird.vy = jumpForce;
            };
            canvas.onclick = () => {
                if (gameOver) { startFlappy(canvas); return; }
                bird.vy = jumpForce;
            };

            function addPipe() {
                const minTop = 60;
                const maxTop = H - gap - 60;
                const topH = minTop + Math.random() * (maxTop - minTop);
                pipes.push({ x: W, topH: topH, passed: false });
            }

            function update() {
                if (gameOver) return;
                frame++;
                bird.vy += gravity;
                bird.y += bird.vy;

                if (bird.y - bird.r < 0 || bird.y + bird.r > H) {
                    gameOver = true;
                }

                if (frame % 90 === 0) addPipe();

                pipes.forEach(p => {
                    p.x -= pipeSpeed;
                    // Collision
                    if (bird.x + bird.r > p.x && bird.x - bird.r < p.x + pipeWidth) {
                        if (bird.y - bird.r < p.topH || bird.y + bird.r > p.topH + gap) {
                            gameOver = true;
                        }
                    }
                    if (!p.passed && p.x + pipeWidth < bird.x) {
                        p.passed = true;
                        score++;
                    }
                });

                pipes = pipes.filter(p => p.x + pipeWidth > 0);
                document.getElementById('gameScore').textContent = `🐤 ${score}`;

                if (gameOver) showToast(`🐤 Flappy: ${score} pontos!`);
            }

            function draw() {
                // Sky gradient
                const grad = ctx.createLinearGradient(0, 0, 0, H);
                grad.addColorStop(0, '#1a1a2e');
                grad.addColorStop(1, '#16213e');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, W, H);

                // Pipes
                pipes.forEach(p => {
                    ctx.fillStyle = '#00b894';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00b894';
                    // Top pipe
                    ctx.fillRect(p.x, 0, pipeWidth, p.topH);
                    ctx.fillRect(p.x - 4, p.topH - 20, pipeWidth + 8, 20);
                    // Bottom pipe
                    const botY = p.topH + gap;
                    ctx.fillRect(p.x, botY, pipeWidth, H - botY);
                    ctx.fillRect(p.x - 4, botY, pipeWidth + 8, 20);
                    ctx.shadowBlur = 0;
                });

                // Bird
                ctx.fillStyle = '#fdcb6e';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#fdcb6e';
                ctx.beginPath();
                ctx.arc(bird.x, bird.y, bird.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Eye
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(bird.x + 5, bird.y - 4, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(bird.x + 7, bird.y - 4, 2.5, 0, Math.PI * 2);
                ctx.fill();

                // Beak
                ctx.fillStyle = '#e17055';
                ctx.beginPath();
                ctx.moveTo(bird.x + bird.r, bird.y);
                ctx.lineTo(bird.x + bird.r + 10, bird.y + 3);
                ctx.lineTo(bird.x + bird.r, bird.y + 6);
                ctx.fill();

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 28px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText('Game Over!', W/2, H/2 - 20);
                    ctx.font = '16px Poppins';
                    ctx.fillText(`Score: ${score}`, W/2, H/2 + 15);
                    ctx.font = '14px Poppins';
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.fillText('Toque para reiniciar', W/2, H/2 + 50);
                }
            }

            function loop() {
                update();
                draw();
                if (!gameOver) gameAnimFrame = requestAnimationFrame(loop);
            }
            addPipe();
            loop();
        }

        // ===================== GAME: BREAKOUT =====================
        function startBreakout(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;

            const paddleW = 80, paddleH = 14;
            let paddleX = W / 2 - paddleW / 2;
            let ball = { x: W / 2, y: H - 60, vx: 3, vy: -3, r: 8 };
            let score = 0;
            let gameOver = false;

            const brickRows = 6, brickCols = 6;
            const brickW = (W - 20) / brickCols;
            const brickH = 22;
            const brickPad = 3;
            const brickTop = 50;
            let bricks = [];

            const colors = ['#e84393', '#fd79a8', '#6c5ce7', '#a855f7', '#0984e3', '#00cec9'];
            for (let r = 0; r < brickRows; r++) {
                for (let c = 0; c < brickCols; c++) {
                    bricks.push({ x: 10 + c * brickW, y: brickTop + r * (brickH + brickPad), w: brickW - brickPad, h: brickH, alive: true, color: colors[r] });
                }
            }

            canvas.ontouchmove = (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                paddleX = e.touches[0].clientX - rect.left - paddleW / 2;
                paddleX = Math.max(0, Math.min(W - paddleW, paddleX));
            };
            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (gameOver) startBreakout(canvas);
            };

            function update() {
                if (gameOver) return;
                ball.x += ball.vx;
                ball.y += ball.vy;

                if (ball.x - ball.r < 0 || ball.x + ball.r > W) ball.vx *= -1;
                if (ball.y - ball.r < 0) ball.vy *= -1;
                if (ball.y + ball.r > H) {
                    gameOver = true;
                    showToast(`🧱 Breakout: ${score} pontos!`);
                    return;
                }

                // Paddle collision
                if (ball.y + ball.r > H - 30 - paddleH && ball.x > paddleX && ball.x < paddleX + paddleW && ball.vy > 0) {
                    ball.vy *= -1;
                    const hitPos = (ball.x - paddleX) / paddleW - 0.5;
                    ball.vx = hitPos * 6;
                }

                // Brick collision
                bricks.forEach(b => {
                    if (!b.alive) return;
                    if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w && ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
                        b.alive = false;
                        ball.vy *= -1;
                        score += 10;
                    }
                });

                if (bricks.every(b => !b.alive)) {
                    gameOver = true;
                    showToast(`🎉 Breakout: Você venceu! ${score} pontos!`);
                }

                document.getElementById('gameScore').textContent = `🧱 ${score}`;
            }

            function draw() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);

                // Bricks
                bricks.forEach(b => {
                    if (!b.alive) return;
                    ctx.fillStyle = b.color;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = b.color;
                    ctx.beginPath();
                    ctx.roundRect(b.x, b.y, b.w, b.h, 4);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });

                // Paddle
                ctx.fillStyle = '#6c5ce7';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#6c5ce7';
                ctx.beginPath();
                ctx.roundRect(paddleX, H - 30 - paddleH, paddleW, paddleH, 7);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Ball
                ctx.fillStyle = '#fdcb6e';
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#fdcb6e';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 24px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText(bricks.every(b => !b.alive) ? 'Você Venceu!' : 'Game Over!', W/2, H/2 - 20);
                    ctx.font = '16px Poppins';
                    ctx.fillText(`Score: ${score}`, W/2, H/2 + 15);
                }
            }

            function loop() {
                update();
                draw();
                if (!gameOver) gameAnimFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // ===================== GAME: PONG =====================
        function startPong(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const pw = 12, ph = 70;

            let player = { y: H/2 - ph/2 };
            let ai = { y: H/2 - ph/2 };
            let ball = { x: W/2, y: H/2, vx: 4, vy: 3, r: 8 };
            let pScore = 0, aScore = 0;

            canvas.ontouchmove = (e) => {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                player.y = e.touches[0].clientY - rect.top - ph/2;
                player.y = Math.max(0, Math.min(H - ph, player.y));
            };

            function update() {
                ball.x += ball.vx;
                ball.y += ball.vy;

                if (ball.y - ball.r < 0 || ball.y + ball.r > H) ball.vy *= -1;

                // Player paddle
                if (ball.x - ball.r < 20 + pw && ball.y > player.y && ball.y < player.y + ph && ball.vx < 0) {
                    ball.vx *= -1.05;
                }
                // AI paddle
                if (ball.x + ball.r > W - 20 - pw && ball.y > ai.y && ball.y < ai.y + ph && ball.vx > 0) {
                    ball.vx *= -1.05;
                }

                // AI movement
                const aiCenter = ai.y + ph/2;
                if (aiCenter < ball.y - 15) ai.y += 3;
                else if (aiCenter > ball.y + 15) ai.y -= 3;

                // Score
                if (ball.x < 0) { aScore++; resetBall(); }
                if (ball.x > W) { pScore++; resetBall(); }

                document.getElementById('gameScore').textContent = `${pScore} - ${aScore}`;
            }

            function resetBall() {
                ball.x = W/2; ball.y = H/2;
                ball.vx = (Math.random() > 0.5 ? 4 : -4);
                ball.vy = (Math.random() - 0.5) * 6;
            }

            function draw() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);

                // Center line
                ctx.setLineDash([8, 8]);
                ctx.strokeStyle = 'rgba(108,92,231,0.3)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(W/2, 0);
                ctx.lineTo(W/2, H);
                ctx.stroke();
                ctx.setLineDash([]);

                // Paddles
                ctx.fillStyle = '#6c5ce7';
                ctx.shadowBlur = 10; ctx.shadowColor = '#6c5ce7';
                ctx.beginPath(); ctx.roundRect(20, player.y, pw, ph, 6); ctx.fill();
                ctx.fillStyle = '#e84393';
                ctx.shadowColor = '#e84393';
                ctx.beginPath(); ctx.roundRect(W - 20 - pw, ai.y, pw, ph, 6); ctx.fill();
                ctx.shadowBlur = 0;

                // Ball
                ctx.fillStyle = 'white';
                ctx.shadowBlur = 12; ctx.shadowColor = 'white';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            function loop() {
                update(); draw();
                gameAnimFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // ===================== GAME: SPACE INVADERS =====================
        function startSpaceInvaders(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;

            let player = { x: W/2, y: H - 50, w: 36, h: 24 };
            let bullets = [];
            let enemies = [];
            let score = 0;
            let gameOver = false;
            let frame = 0;
            let enemyDir = 1;
            let enemySpeed = 0.5;

            // Create enemies
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 6; c++) {
                    enemies.push({ x: 30 + c * 50, y: 40 + r * 40, w: 30, h: 24, alive: true });
                }
            }

            canvas.ontouchmove = (e) => {
                e.preventDefault();
                if (gameOver) return;
                const rect = canvas.getBoundingClientRect();
                player.x = e.touches[0].clientX - rect.left;
                player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));
            };

            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (gameOver) { startSpaceInvaders(canvas); return; }
                bullets.push({ x: player.x, y: player.y - 15, vy: -6 });
            };

            function update() {
                if (gameOver) return;
                frame++;

                // Bullets
                bullets.forEach(b => b.y += b.vy);
                bullets = bullets.filter(b => b.y > 0);

                // Enemy movement
                let hitEdge = false;
                enemies.filter(e => e.alive).forEach(e => {
                    e.x += enemySpeed * enemyDir;
                    if (e.x + e.w > W - 10 || e.x < 10) hitEdge = true;
                });
                if (hitEdge) {
                    enemyDir *= -1;
                    enemies.filter(e => e.alive).forEach(e => e.y += 15);
                }

                // Collision
                bullets.forEach(b => {
                    enemies.forEach(e => {
                        if (!e.alive) return;
                        if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
                            e.alive = false;
                            b.vy = 0; b.y = -100;
                            score += 10;
                        }
                    });
                });

                // Check win/loss
                if (enemies.every(e => !e.alive)) {
                    gameOver = true;
                    showToast(`🎉 Space Invaders: Você venceu! ${score}pts`);
                }
                if (enemies.some(e => e.alive && e.y + e.h > player.y - 10)) {
                    gameOver = true;
                    showToast(`👾 Space Invaders: ${score} pontos!`);
                }

                document.getElementById('gameScore').textContent = `👾 ${score}`;
            }

            function draw() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);

                // Stars
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                for (let i = 0; i < 50; i++) {
                    const sx = (i * 73 + frame * 0.1) % W;
                    const sy = (i * 51) % H;
                    ctx.fillRect(sx, sy, 1.5, 1.5);
                }

                // Player
                ctx.fillStyle = '#00cec9';
                ctx.shadowBlur = 10; ctx.shadowColor = '#00cec9';
                ctx.beginPath();
                ctx.moveTo(player.x, player.y - player.h);
                ctx.lineTo(player.x - player.w/2, player.y);
                ctx.lineTo(player.x + player.w/2, player.y);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Bullets
                ctx.fillStyle = '#fdcb6e';
                ctx.shadowBlur = 8; ctx.shadowColor = '#fdcb6e';
                bullets.forEach(b => {
                    ctx.fillRect(b.x - 2, b.y, 4, 12);
                });
                ctx.shadowBlur = 0;

                // Enemies
                enemies.filter(e => e.alive).forEach((e, i) => {
                    ctx.fillStyle = i % 2 === 0 ? '#e84393' : '#fd79a8';
                    ctx.shadowBlur = 5; ctx.shadowColor = '#e84393';
                    ctx.beginPath();
                    ctx.roundRect(e.x, e.y, e.w, e.h, 4);
                    ctx.fill();
                    // Eyes
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(e.x + 10, e.y + 10, 3, 0, Math.PI * 2);
                    ctx.arc(e.x + 20, e.y + 10, 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 24px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText(enemies.every(e => !e.alive) ? 'Você Venceu!' : 'Game Over!', W/2, H/2 - 20);
                    ctx.font = '16px Poppins';
                    ctx.fillText(`Score: ${score}`, W/2, H/2 + 15);
                }
            }

            function loop() {
                update(); draw();
                if (!gameOver) gameAnimFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // ===================== GAME: DINO RUN =====================
        function startDino(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const ground = H - 60;

            let dino = { x: 60, y: ground, vy: 0, w: 30, h: 40, jumping: false };
            let obstacles = [];
            let score = 0;
            let gameOver = false;
            let speed = 4;
            let frame = 0;

            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (gameOver) { startDino(canvas); return; }
                if (!dino.jumping) {
                    dino.vy = -12;
                    dino.jumping = true;
                }
            };

            function update() {
                if (gameOver) return;
                frame++;
                score = Math.floor(frame / 6);

                // Dino physics
                dino.vy += 0.6;
                dino.y += dino.vy;
                if (dino.y >= ground) {
                    dino.y = ground;
                    dino.vy = 0;
                    dino.jumping = false;
                }

                // Obstacles
                if (frame % Math.max(40, 80 - score / 5) === 0) {
                    const h = 20 + Math.random() * 30;
                    obstacles.push({ x: W + 20, y: ground - h + dino.h, w: 20, h: h + 10 });
                }

                obstacles.forEach(o => o.x -= speed);
                obstacles = obstacles.filter(o => o.x + o.w > 0);

                // Collision
                obstacles.forEach(o => {
                    if (dino.x + dino.w > o.x + 5 && dino.x < o.x + o.w - 5 && dino.y + dino.h > o.y + 5) {
                        gameOver = true;
                        showToast(`🦖 Dino: ${score} pontos!`);
                    }
                });

                speed = 4 + score / 100;
                document.getElementById('gameScore').textContent = `🦖 ${score}`;
            }

            function draw() {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, W, H);

                // Ground
                ctx.fillStyle = 'rgba(108,92,231,0.3)';
                ctx.fillRect(0, ground + dino.h, W, 2);

                // Dino
                ctx.fillStyle = '#00cec9';
                ctx.shadowBlur = 8; ctx.shadowColor = '#00cec9';
                ctx.beginPath();
                ctx.roundRect(dino.x, dino.y, dino.w, dino.h, 6);
                ctx.fill();
                // Eye
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(dino.x + 22, dino.y + 10, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(dino.x + 23, dino.y + 10, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Obstacles
                ctx.fillStyle = '#e17055';
                ctx.shadowBlur = 5; ctx.shadowColor = '#e17055';
                obstacles.forEach(o => {
                    ctx.beginPath();
                    ctx.roundRect(o.x, o.y, o.w, o.h, 3);
                    ctx.fill();
                });
                ctx.shadowBlur = 0;

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 26px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText('Game Over!', W/2, H/2 - 20);
                    ctx.font = '16px Poppins';
                    ctx.fillText(`Score: ${score}`, W/2, H/2 + 15);
                }
            }

            function loop() {
                update(); draw();
                if (!gameOver) gameAnimFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // ===================== GAME: TIC TAC TOE =====================
        function startTicTacToe(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const size = Math.min(W, H * 0.6);
            const cellSize = size / 3;
            const offsetX = (W - size) / 2;
            const offsetY = (H - size) / 2;

            let board = Array(9).fill(null);
            let turn = 'X';
            let winner = null;
            let gameOver = false;

            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (gameOver) { startTicTacToe(canvas); return; }
                if (turn !== 'X') return;

                const rect = canvas.getBoundingClientRect();
                const tx = e.touches[0].clientX - rect.left - offsetX;
                const ty = e.touches[0].clientY - rect.top - offsetY;
                const col = Math.floor(tx / cellSize);
                const row = Math.floor(ty / cellSize);

                if (col >= 0 && col < 3 && row >= 0 && row < 3) {
                    const idx = row * 3 + col;
                    if (!board[idx]) {
                        board[idx] = 'X';
                        winner = checkWinner();
                        if (winner || board.every(c => c)) { gameOver = true; draw(); return; }
                        turn = 'O';
                        draw();
                        setTimeout(aiMove, 400);
                    }
                }
            };

            function aiMove() {
                if (gameOver) return;
                const empty = board.map((v, i) => v === null ? i : -1).filter(i => i >= 0);
                if (empty.length === 0) return;

                // Try to win
                for (let i of empty) { board[i] = 'O'; if (checkWinner() === 'O') { finalize(); return; } board[i] = null; }
                // Try to block
                for (let i of empty) { board[i] = 'X'; if (checkWinner() === 'X') { board[i] = 'O'; finalize(); return; } board[i] = null; }
                // Center
                if (!board[4]) { board[4] = 'O'; finalize(); return; }
                // Random
                const pick = empty[Math.floor(Math.random() * empty.length)];
                board[pick] = 'O';
                finalize();
            }

            function finalize() {
                winner = checkWinner();
                if (winner || board.every(c => c)) gameOver = true;
                turn = 'X';
                draw();
                if (gameOver) {
                    showToast(winner ? (winner === 'X' ? '🎉 Você venceu!' : '🤖 IA venceu!') : '🤝 Empate!');
                }
            }

            function checkWinner() {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a,b,c] of lines) {
                    if (board[a] && board[a] === board[b] && board[b] === board[c]) return board[a];
                }
                return null;
            }

            function draw() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);

                ctx.strokeStyle = 'rgba(108,92,231,0.4)';
                ctx.lineWidth = 3;

                // Grid lines
                for (let i = 1; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(offsetX + i * cellSize, offsetY);
                    ctx.lineTo(offsetX + i * cellSize, offsetY + size);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(offsetX, offsetY + i * cellSize);
                    ctx.lineTo(offsetX + size, offsetY + i * cellSize);
                    ctx.stroke();
                }

                // Pieces
                board.forEach((val, idx) => {
                    if (!val) return;
                    const col = idx % 3;
                    const row = Math.floor(idx / 3);
                    const cx = offsetX + col * cellSize + cellSize / 2;
                    const cy = offsetY + row * cellSize + cellSize / 2;
                    const s = cellSize * 0.3;

                    if (val === 'X') {
                        ctx.strokeStyle = '#6c5ce7';
                        ctx.lineWidth = 5;
                        ctx.shadowBlur = 10; ctx.shadowColor = '#6c5ce7';
                        ctx.beginPath();
                        ctx.moveTo(cx - s, cy - s); ctx.lineTo(cx + s, cy + s);
                        ctx.moveTo(cx + s, cy - s); ctx.lineTo(cx - s, cy + s);
                        ctx.stroke();
                    } else {
                        ctx.strokeStyle = '#e84393';
                        ctx.lineWidth = 5;
                        ctx.shadowBlur = 10; ctx.shadowColor = '#e84393';
                        ctx.beginPath();
                        ctx.arc(cx, cy, s, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                    ctx.shadowBlur = 0;
                });

                // Status text
                ctx.fillStyle = 'white';
                ctx.font = 'bold 18px Poppins';
                ctx.textAlign = 'center';
                if (gameOver) {
                    ctx.fillText(winner ? (winner === 'X' ? '🎉 Você Venceu!' : '🤖 IA Venceu!') : '🤝 Empate!', W/2, offsetY - 20);
                    ctx.font = '14px Poppins';
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.fillText('Toque para reiniciar', W/2, offsetY + size + 40);
                } else {
                    ctx.fillText(turn === 'X' ? 'Sua vez (X)' : 'IA pensando...', W/2, offsetY - 20);
                }
            }

            draw();
        }

        // ===================== GAME: WHACK A MOLE =====================
        function startWhackAMole(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;
            const cols = 3, rows = 4;
            const cellW = W / cols, cellH = (H - 80) / rows;

            let moles = Array(cols * rows).fill(false);
            let score = 0;
            let timeLeft = 30;
            let gameOver = false;

            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (gameOver) { startWhackAMole(canvas); return; }
                const rect = canvas.getBoundingClientRect();
                const tx = e.touches[0].clientX - rect.left;
                const ty = e.touches[0].clientY - rect.top - 50;
                const col = Math.floor(tx / cellW);
                const row = Math.floor(ty / cellH);
                if (col >= 0 && col < cols && row >= 0 && row < rows) {
                    const idx = row * cols + col;
                    if (moles[idx]) {
                        moles[idx] = false;
                        score += 10;
                    }
                }
            };

            const moleInterval = setInterval(() => {
                if (gameOver) { clearInterval(moleInterval); return; }
                moles = moles.map(() => false);
                const count = 1 + Math.floor(Math.random() * 3);
                for (let i = 0; i < count; i++) {
                    moles[Math.floor(Math.random() * moles.length)] = true;
                }
            }, 800);

            const timerInterval = setInterval(() => {
                if (gameOver) { clearInterval(timerInterval); return; }
                timeLeft--;
                if (timeLeft <= 0) {
                    gameOver = true;
                    showToast(`🔨 Whack-a-Mole: ${score} pontos!`);
                }
            }, 1000);

            function draw() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);

                // Timer
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Poppins';
                ctx.textAlign = 'center';
                ctx.fillText(`⏱️ ${timeLeft}s`, W/2, 30);

                document.getElementById('gameScore').textContent = `🔨 ${score}`;

                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const idx = r * cols + c;
                        const cx = c * cellW + cellW / 2;
                        const cy = 50 + r * cellH + cellH / 2;

                        // Hole
                        ctx.fillStyle = 'rgba(108,92,231,0.15)';
                        ctx.beginPath();
                        ctx.ellipse(cx, cy + 20, cellW * 0.35, cellH * 0.15, 0, 0, Math.PI * 2);
                        ctx.fill();

                        if (moles[idx]) {
                            // Mole
                            ctx.fillStyle = '#e17055';
                            ctx.shadowBlur = 10; ctx.shadowColor = '#e17055';
                            ctx.beginPath();
                            ctx.arc(cx, cy - 5, Math.min(cellW, cellH) * 0.25, 0, Math.PI * 2);
                            ctx.fill();
                            // Eyes
                            ctx.fillStyle = 'white';
                            ctx.beginPath();
                            ctx.arc(cx - 8, cy - 10, 4, 0, Math.PI * 2);
                            ctx.arc(cx + 8, cy - 10, 4, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.fillStyle = 'black';
                            ctx.beginPath();
                            ctx.arc(cx - 8, cy - 10, 2, 0, Math.PI * 2);
                            ctx.arc(cx + 8, cy - 10, 2, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                        }
                    }
                }

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 24px Poppins';
                    ctx.fillText('Tempo Esgotado!', W/2, H/2 - 20);
                    ctx.font = '16px Poppins';
                    ctx.fillText(`Score: ${score}`, W/2, H/2 + 15);
                }
            }

            function loop() {
                draw();
                if (!gameOver) gameAnimFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // ===================== GAME: BALLOON POP =====================
        function startBalloonPop(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;

            let balloons = [];
            let score = 0;
            let missed = 0;
            let gameOver = false;
            let frame = 0;

            const colors = ['#e84393', '#6c5ce7', '#00cec9', '#fdcb6e', '#e17055', '#55efc4'];

            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (gameOver) { startBalloonPop(canvas); return; }
                const rect = canvas.getBoundingClientRect();
                const tx = e.touches[0].clientX - rect.left;
                const ty = e.touches[0].clientY - rect.top;

                for (let i = balloons.length - 1; i >= 0; i--) {
                    const b = balloons[i];
                    const dist = Math.hypot(tx - b.x, ty - b.y);
                    if (dist < b.r) {
                        balloons.splice(i, 1);
                        score += 10;
                        break;
                    }
                }
            };

            function update() {
                if (gameOver) return;
                frame++;

                if (frame % 30 === 0) {
                    balloons.push({
                        x: 30 + Math.random() * (W - 60),
                        y: H + 30,
                        r: 20 + Math.random() * 15,
                        vy: -1.5 - Math.random() * 2,
                        color: colors[Math.floor(Math.random() * colors.length)]
                    });
                }

                balloons.forEach(b => b.y += b.vy);

                const before = balloons.length;
                balloons = balloons.filter(b => b.y + b.r > 0);
                missed += before - balloons.length;

                if (missed > 10) {
                    gameOver = true;
                    showToast(`🎈 Balloon Pop: ${score} pontos!`);
                }

                document.getElementById('gameScore').textContent = `🎈 ${score}`;
            }

            function draw() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);

                balloons.forEach(b => {
                    ctx.fillStyle = b.color;
                    ctx.shadowBlur = 10; ctx.shadowColor = b.color;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                    ctx.fill();
                    // String
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(b.x, b.y + b.r);
                    ctx.lineTo(b.x + Math.sin(frame * 0.05) * 5, b.y + b.r + 20);
                    ctx.stroke();
                    // Shine
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.beginPath();
                    ctx.arc(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.15, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });

                // Missed counter
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '12px Poppins';
                ctx.textAlign = 'left';
                ctx.fillText(`Escaped: ${missed}/10`, 10, 30);

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 24px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText('Game Over!', W/2, H/2 - 20);
                    ctx.font = '16px Poppins';
                    ctx.fillText(`Score: ${score}`, W/2, H/2 + 15);
                }
            }

            function loop() {
                update(); draw();
                if (!gameOver) gameAnimFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // ===================== GAME: STACK TOWER =====================
        function startStackTower(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;

            let blocks = [{ x: W/2 - 60, w: 120, y: H - 30, h: 25 }];
            let current = { x: 0, w: 120, speed: 3, dir: 1 };
            let score = 0;
            let gameOver = false;

            const colors = ['#6c5ce7', '#a855f7', '#e84393', '#fd79a8', '#00cec9', '#55efc4', '#fdcb6e', '#e17055', '#0984e3', '#74b9ff'];

            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (gameOver) { startStackTower(canvas); return; }

                const top = blocks[blocks.length - 1];
                const overlapStart = Math.max(current.x, top.x);
                const overlapEnd = Math.min(current.x + current.w, top.x + top.w);
                const overlapW = overlapEnd - overlapStart;

                if (overlapW <= 0) {
                    gameOver = true;
                    showToast(`🏗️ Stack Tower: ${score} pontos!`);
                    return;
                }

                const newY = top.y - 25;
                blocks.push({ x: overlapStart, w: overlapW, y: newY, h: 25 });
                current.x = overlapStart;
                current.w = overlapW;
                current.speed += 0.2;
                score++;

                // Scroll down if needed
                if (newY < H * 0.3) {
                    blocks.forEach(b => b.y += 25);
                }

                document.getElementById('gameScore').textContent = `🏗️ ${score}`;
            };

            function update() {
                if (gameOver) return;
                current.x += current.speed * current.dir;
                if (current.x + current.w > W) current.dir = -1;
                if (current.x < 0) current.dir = 1;
            }

            function draw() {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);

                // Blocks
                blocks.forEach((b, i) => {
                    ctx.fillStyle = colors[i % colors.length];
                    ctx.shadowBlur = 5; ctx.shadowColor = colors[i % colors.length];
                    ctx.beginPath();
                    ctx.roundRect(b.x, b.y, b.w, b.h - 2, 3);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });

                // Current moving block
                if (!gameOver) {
                    const top = blocks[blocks.length - 1];
                    const color = colors[blocks.length % colors.length];
                    ctx.fillStyle = color;
                    ctx.shadowBlur = 10; ctx.shadowColor = color;
                    ctx.beginPath();
                    ctx.roundRect(current.x, top.y - 25, current.w, 23, 3);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                if (gameOver) {
                    ctx.fillStyle = 'rgba(0,0,0,0.7)';
                    ctx.fillRect(0, 0, W, H);
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 24px Poppins';
                    ctx.textAlign = 'center';
                    ctx.fillText('Game Over!', W/2, H/2 - 20);
                    ctx.font = '16px Poppins';
                    ctx.fillText(`Height: ${score}`, W/2, H/2 + 15);
                }
            }

            function loop() {
                update(); draw();
                if (!gameOver) gameAnimFrame = requestAnimationFrame(loop);
            }
            loop();
        }

        // ===================== GAME: CAR RACE =====================
        function startCarRace(canvas) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width, H = canvas.height;

            const laneW = W / 3;
            let playerLane = 1;
            let enemies = [];
            let score = 0;
            let gameOver = false;
            let frame = 0;
            let speed = 4;

            canvas.ontouchstart = (e) => {
                e.preventDefault();
                if (gameOver) { startCarRace(canvas); return; }
                const rect = canvas.getBoundingClientRect();
                const tx = e.touches[0].clientX - rect.left;
                if (tx < W / 2 && playerLane > 0) playerLane--;
                else if (tx >= W / 2 && playerLane < 2) playerLane++;
            };

            function update() {
                if (gameOver) return;
                frame++;
                score = Math.floor(frame / 5);
                speed = 4 + score / 50;

                if (frame % Math.max(20, 50 - score / 10) === 0) {
                    enemies.push({ lane: Math.floor(Math.random() * 3), y: -50 });
                }

                enemies.forEach(e => e.y += speed);
                enemies = enemies.filter(e => e.y < H + 50);

                // Collision
                enemies.forEach(e => {
                    if (e.lane === playerLane && e.y > H - 100 && e.y < H - 20) {
                        gameOver = true;
                        showToast(`🏎️ Car Race: ${score} pontos!`);
                    }
                });

                document.getElementById('gameScore').textContent = `🏎️ ${score}`;
            }

            function draw() {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, W, H);

                // Road lines
                ctx.strokeStyle = 'rgba(108,92,231,0.3)';
                ctx.lineWidth = 2;
                ctx.setLineDash([20, 20]);
                for (let i = 1; i < 3; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * laneW, 0);
                    ctx.lineTo(i * laneW, H);
                    ctx.stroke();
                }
                ctx.setLineDash([]);

                // Dashes moving
                ctx.fillStyle = 'rgba(108,92,231,0.2)';
                for (let i = 1; i < 3; i++) {
                    for (let y = (frame * speed) % 40 - 40; y < H; y += 40) {
                        ctx.fillRect(i * laneW - 1, y, 2, 20);
                    }
                }

                // Player car
                const px = playerLane * laneW + laneW / 2;
                const py = H - 80;
                ctx.fillStyle = '#6c5ce7';
                ctx.shadowBlur = 15; ctx.shadowColor = '#6c5ce7';
                ctx.beginPath();
                ctx.roundRect(px - 18, py, 36, 55, 8);
                ctx.fill();
                ctx.fillStyle = '#a855f7';
                ctx.beginPath();
