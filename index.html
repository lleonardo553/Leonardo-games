<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🎮 PlayZone</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a1a;color:#fff;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#6c5ce7;border-radius:9px}

.page{min-height:100vh;padding-bottom:65px}

/* HEADER */
.hdr{position:sticky;top:0;z-index:90;background:rgba(10,10,26,.92);backdrop-filter:blur(12px);padding:10px 12px;border-bottom:1px solid rgba(108,92,231,.12)}
.hdr h1{font-size:18px;background:linear-gradient(90deg,#6c5ce7,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.sbar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(108,92,231,.18);border-radius:10px;padding:7px 12px}
.sbar input{flex:1;background:none;border:none;color:#fff;font-size:13px;outline:none}

/* CATEGORIES */
.cats{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cbtn{flex-shrink:0;padding:6px 14px;border-radius:18px;border:1px solid rgba(108,92,231,.2);background:rgba(108,92,231,.06);color:#aaa;font-size:11px;font-weight:600;cursor:pointer}
.cbtn.on{background:linear-gradient(135deg,#6c5ce7,#a855f7);color:#fff;border-color:transparent}

/* GAME GRID */
.sec{margin-bottom:18px}
.sec-t{font-size:14px;font-weight:800;padding:0 12px;margin-bottom:8px}
.row{display:flex;gap:8px;padding:0 12px;overflow-x:auto;scrollbar-width:none}
.row::-webkit-scrollbar{display:none}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:0 12px}
.gc{cursor:pointer;transition:.15s}.gc:active{transform:scale(.94)}
.gc .th{border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:36px;aspect-ratio:1;margin-bottom:4px}
.gc .nm{font-size:10px;font-weight:600;text-align:center;line-height:1.2}
.gc2{flex-shrink:0;width:100px;cursor:pointer}.gc2:active{transform:scale(.94)}
.gc2 .th{width:100px;height:100px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:4px}
.gc2 .nm{font-size:10px;font-weight:600}
.gc2 .ct{font-size:9px;color:#888}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:90;background:rgba(10,10,26,.95);backdrop-filter:blur(12px);display:flex;border-top:1px solid rgba(108,92,231,.12)}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:7px 0 max(5px,env(safe-area-inset-bottom));border:none;background:none;color:#666;font-size:9px;font-weight:600;cursor:pointer}
.nb.on{color:#6c5ce7}
.nb i{font-size:18px;font-style:normal}

/* MODAL */
.modal{position:fixed;inset:0;z-index:200;background:#0a0a1a;display:none;flex-direction:column}
.modal.open{display:flex}
.mh{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(10,10,26,.95);border-bottom:1px solid rgba(108,92,231,.12)}
.mback{width:32px;height:32px;border-radius:8px;border:1px solid rgba(108,92,231,.2);background:rgba(108,92,231,.08);color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.mh span{flex:1;font-size:13px;font-weight:700}
.mfav{font-size:18px;cursor:pointer}
.mbody{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;overflow:hidden;position:relative}
.cw{width:100%;max-width:420px;background:#111;border-radius:12px;overflow:hidden;position:relative;touch-action:none}
canvas{display:block}
.hud{position:absolute;top:6px;width:100%;text-align:center;font-size:16px;font-weight:800;text-shadow:0 1px 6px rgba(0,0,0,.8);pointer-events:none;z-index:2}
.startscr{position:absolute;inset:0;background:rgba(10,10,26,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:5}
.startscr .em{font-size:56px}
.startscr .ds{font-size:12px;color:#aaa;text-align:center;max-width:240px}
.playbtn{padding:10px 32px;border-radius:12px;background:linear-gradient(135deg,#6c5ce7,#a855f7);border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(108,92,231,.35);margin-top:6px}
.playbtn:active{transform:scale(.95)}
.ctrl{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;justify-content:center}
.ctrl button{padding:10px 16px;border-radius:10px;border:1px solid rgba(108,92,231,.2);background:rgba(108,92,231,.1);color:#fff;font-size:18px;cursor:pointer;min-width:50px}
.ctrl button:active{background:rgba(108,92,231,.3);transform:scale(.92)}

.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(60px);background:#1a1a3a;border:1px solid rgba(108,92,231,.2);padding:8px 18px;border-radius:10px;font-size:11px;font-weight:600;z-index:999;transition:.3s;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="page" id="page"></div>

<nav class="bnav">
<button class="nb on" onclick="tab('home',this)"><i>🏠</i>Início</button>
<button class="nb" onclick="tab('hot',this)"><i>🔥</i>Popular</button>
<button class="nb" onclick="tab('fav',this)"><i>❤️</i>Favoritos</button>
</nav>

<div class="modal" id="modal">
<div class="mh">
<div class="mback" onclick="closeModal()">◀</div>
<span id="mtitle"></span>
<div class="mfav" id="mfav" onclick="toggleFav()">🤍</div>
</div>
<div class="mbody">
<div class="cw" id="cw">
<canvas id="cv"></canvas>
<div class="hud" id="hud"></div>
<div class="startscr" id="startscr">
<div class="em" id="sem"></div>
<div style="font-weight:700;font-size:16px" id="sname"></div>
<div class="ds" id="sdesc"></div>
<button class="playbtn" onclick="startGame()">▶ JOGAR</button>
</div>
</div>
<div class="ctrl" id="ctrl"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ DATA ============
const GAMES=[
{id:'snake',n:'Snake',e:'🐍',c:'arcade',g:'linear-gradient(135deg,#00b894,#00cec9)',d:'Swipe ou use setas para mudar direção. Coma a comida vermelha!'},
{id:'flappy',n:'Flappy Bird',e:'🐤',c:'arcade',g:'linear-gradient(135deg,#fdcb6e,#e17055)',d:'Toque/clique ou ESPAÇO para voar. Desvie dos canos!'},
{id:'breakout',n:'Breakout',e:'🧱',c:'arcade',g:'linear-gradient(135deg,#e17055,#d63031)',d:'Mova o mouse/dedo para controlar a raquete. Destrua os blocos!'},
{id:'pong',n:'Pong',e:'🏓',c:'sports',g:'linear-gradient(135deg,#636e72,#2d3436)',d:'Mova o mouse/dedo para controlar sua raquete à esquerda!'},
{id:'dino',n:'Dino Run',e:'🦖',c:'arcade',g:'linear-gradient(135deg,#636e72,#b2bec3)',d:'Toque/clique ou ESPAÇO para pular os obstáculos!'},
{id:'invaders',n:'Space Invaders',e:'👾',c:'action',g:'linear-gradient(135deg,#6c5ce7,#a855f7)',d:'Setas/AD para mover, ESPAÇO/toque para atirar!'},
{id:'ttt',n:'Jogo da Velha',e:'❌',c:'puzzle',g:'linear-gradient(135deg,#6c5ce7,#fd79a8)',d:'Toque/clique numa célula para jogar. Vença a IA!'},
{id:'memory',n:'Memória',e:'🃏',c:'puzzle',g:'linear-gradient(135deg,#fd79a8,#e84393)',d:'Toque/clique para virar cartas. Encontre os pares!'},
{id:'2048',n:'2048',e:'🔢',c:'puzzle',g:'linear-gradient(135deg,#fdcb6e,#f39c12)',d:'Swipe ou setas para mover os números. Combine iguais!'},
{id:'balloon',n:'Balloon Pop',e:'🎈',c:'arcade',g:'linear-gradient(135deg,#e84393,#fd79a8)',d:'Toque/clique nos balões para estourar antes que escapem!'},
{id:'car',n:'Car Dodge',e:'🏎️',c:'racing',g:'linear-gradient(135deg,#e84393,#a855f7)',d:'Toque esquerda/direita ou setas para mudar de faixa!'},
{id:'catch',n:'Fruit Catch',e:'🍎',c:'arcade',g:'linear-gradient(135deg,#00b894,#fdcb6e)',d:'Mova o mouse/dedo para pegar as frutas que caem!'},
{id:'dodge',n:'Dodge Ball',e:'⚡',c:'action',g:'linear-gradient(135deg,#0984e3,#00cec9)',d:'Mova o mouse/dedo para desviar das bolas vermelhas!'},
{id:'stack',n:'Stack Tower',e:'🏗️',c:'arcade',g:'linear-gradient(135deg,#fdcb6e,#e17055)',d:'Toque/clique no momento certo para empilhar os blocos!'},
{id:'shooter',n:'Target Shoot',e:'🎯',c:'action',g:'linear-gradient(135deg,#d63031,#e17055)',d:'Toque/clique nos alvos para ganhar pontos!'},
];

let favs=JSON.parse(localStorage.getItem('fav')||'[]');
let cur=null,anim=null,ival=null;

// ============ INIT ============
tab('home',document.querySelector('.nb'));

// ============ TABS ============
function tab(t,btn){
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const p=document.getElementById('page');
  if(t==='home'){
    p.innerHTML=headerHTML()+catsHTML()+
      secRow('🔥 Em Alta',GAMES.filter(g=>g.c==='arcade'))+
      secRow('⚔️ Ação',GAMES.filter(g=>g.c==='action'))+
      secRow('🧩 Puzzle',GAMES.filter(g=>g.c==='puzzle'))+
      secGrid('🎮 Todos',GAMES);
    bindSearch();bindCats();
  }else if(t==='hot'){
    p.innerHTML=headerHTML()+secGrid('🔥 Popular',GAMES);
    bindSearch();
  }else if(t==='fav'){
    const fg=GAMES.filter(g=>favs.includes(g.id));
    p.innerHTML=headerHTML()+(fg.length?secGrid('❤️ Favoritos',fg):'<div style="text-align:center;padding:60px;color:#666"><div style="font-size:40px;margin-bottom:8px">❤️</div>Sem favoritos</div>');
    bindSearch();
  }
  window.scrollTo(0,0);
}

function headerHTML(){return `<div class="hdr"><h1>🎮 PlayZone</h1><div class="sbar"><span>🔍</span><input placeholder="Buscar jogos..." id="sinp"></div></div>`}
function catsHTML(){
  const cats=['all','arcade','puzzle','action','racing','sports'];
  const lb=['🎯 Todos','👾 Arcade','🧩 Puzzle','⚔️ Ação','🏎️ Racing','⚽ Sports'];
  return `<div class="cats">${cats.map((c,i)=>`<div class="cbtn${i===0?' on':''}" data-c="${c}">${lb[i]}</div>`).join('')}</div>`;
}
function secRow(title,games){
  return `<div class="sec"><div class="sec-t">${title}</div><div class="row">${games.map(g=>`<div class="gc2" onclick="openModal('${g.id}')"><div class="th" style="background:${g.g}">${g.e}</div><div class="nm">${g.n}</div><div class="ct">${g.c}</div></div>`).join('')}</div></div>`;
}
function secGrid(title,games){
  return `<div class="sec"><div class="sec-t">${title}</div><div class="grid">${games.map(g=>`<div class="gc" onclick="openModal('${g.id}')"><div class="th" style="background:${g.g}">${g.e}</div><div class="nm">${g.n}</div></div>`).join('')}</div></div>`;
}

function bindSearch(){
  const inp=document.getElementById('sinp');
  if(!inp)return;
  inp.oninput=()=>{
    const v=inp.value.toLowerCase().trim();
    if(!v){tab('home',document.querySelector('.nb.on'));return;}
    const f=GAMES.filter(g=>g.n.toLowerCase().includes(v));
    const sec=document.querySelectorAll('.sec');
    sec.forEach(s=>s.remove());
    const cats=document.querySelector('.cats');if(cats)cats.remove();
    document.getElementById('page').insertAdjacentHTML('beforeend',f.length?secGrid('🔍 Resultados',f):'<div class="sec" style="text-align:center;padding:40px;color:#666">Nenhum resultado</div>');
  };
}

function bindCats(){
  document.querySelectorAll('.cbtn').forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
      const c=b.dataset.c;
      const filtered=c==='all'?GAMES:GAMES.filter(g=>g.c===c);
      document.querySelectorAll('.sec').forEach(s=>s.remove());
      document.getElementById('page').insertAdjacentHTML('beforeend',secGrid(c==='all'?'🎮 Todos':c.toUpperCase(),filtered));
    };
  });
}

// ============ TOAST ============
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2000);}

// ============ FAVORITES ============
function toggleFav(){
  if(!cur)return;
  const i=favs.indexOf(cur.id);
  if(i>-1){favs.splice(i,1);toast('💔 Removido');}else{favs.push(cur.id);toast('❤️ Favoritado!');}
  localStorage.setItem('fav',JSON.stringify(favs));
  document.getElementById('mfav').textContent=favs.includes(cur.id)?'❤️':'🤍';
}

// ============ MODAL ============
function openModal(id){
  cur=GAMES.find(g=>g.id===id);
  document.getElementById('mtitle').textContent=cur.e+' '+cur.n;
  document.getElementById('mfav').textContent=favs.includes(id)?'❤️':'🤍';
  document.getElementById('sem').textContent=cur.e;
  document.getElementById('sname').textContent=cur.n;
  document.getElementById('sdesc').textContent=cur.d;
  document.getElementById('startscr').style.display='flex';
  document.getElementById('hud').textContent='';
  document.getElementById('ctrl').innerHTML='';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
  sizeCanvas();
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
  stopAll();cur=null;
}

function stopAll(){
  if(anim){cancelAnimationFrame(anim);anim=null;}
  if(ival){clearInterval(ival);ival=null;}
  document.onkeydown=null;document.onkeyup=null;
}

function sizeCanvas(){
  const w=document.getElementById('cw');
  const cv=document.getElementById('cv');
  const maxH=window.innerHeight-90;
  const ww=w.clientWidth;
  const hh=Math.min(maxH,ww*1.5);
  w.style.height=hh+'px';
  cv.width=ww;cv.height=hh;
}

function startGame(){
  document.getElementById('startscr').style.display='none';
  stopAll();sizeCanvas();
  const cv=document.getElementById('cv');
  const fn={snake:snakeG,flappy:flappyG,breakout:breakoutG,pong:pongG,dino:dinoG,invaders:invadersG,ttt:tttG,memory:memoryG,'2048':g2048,balloon:balloonG,car:carG,catch:catchG,dodge:dodgeG,stack:stackG,shooter:shooterG};
  if(fn[cur.id])fn[cur.id](cv);
}

function hud(t){document.getElementById('hud').textContent=t;}

function showEnd(cv,title,sub){
  const ctx=cv.getContext('2d');
  ctx.fillStyle='rgba(0,0,0,.78)';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#fff';ctx.textAlign='center';
  ctx.font='bold 24px system-ui';ctx.fillText(title,cv.width/2,cv.height/2-18);
  ctx.font='14px system-ui';ctx.fillText(sub,cv.width/2,cv.height/2+12);
  ctx.fillStyle='rgba(255,255,255,.35)';ctx.font='12px system-ui';
  ctx.fillText('Toque ou ESPAÇO para reiniciar',cv.width/2,cv.height/2+42);
}

function onRestart(cv,fn){
  cv.onclick=()=>{stopAll();fn(cv);};
  cv.ontouchstart=(e)=>{e.preventDefault();stopAll();fn(cv);};
  document.onkeydown=(e)=>{if(e.code==='Space'){e.preventDefault();stopAll();fn(cv);}};
}

// ============ ROUND RECT ============
function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ===============================================================
//  SNAKE
// ===============================================================
function snakeG(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const SZ=18,C=Math.floor(W/SZ),R=Math.floor(H/SZ);
  let sn=[{x:Math.floor(C/2),y:Math.floor(R/2)}],dir={x:1,y:0},nd={x:1,y:0};
  let food=mkFood(),sc=0,dead=false;

  function mkFood(){let f;do{f={x:Math.floor(Math.random()*C),y:Math.floor(Math.random()*R)};}while(sn.some(s=>s.x===f.x&&s.y===f.y));return f;}

  // KEYBOARD
  document.onkeydown=(e)=>{
    const k=e.key;
    if((k==='ArrowUp'||k==='w')&&dir.y!==1){nd={x:0,y:-1};e.preventDefault();}
    if((k==='ArrowDown'||k==='s')&&dir.y!==-1){nd={x:0,y:1};e.preventDefault();}
    if((k==='ArrowLeft'||k==='a')&&dir.x!==1){nd={x:-1,y:0};e.preventDefault();}
    if((k==='ArrowRight'||k==='d')&&dir.x!==-1){nd={x:1,y:0};e.preventDefault();}
  };

  // TOUCH SWIPE
  let tx=0,ty=0;
  cv.ontouchstart=(e)=>{e.preventDefault();const t=e.touches[0];tx=t.clientX;ty=t.clientY;};
  cv.ontouchmove=(e)=>{e.preventDefault();}; // prevent scroll
  cv.ontouchend=(e)=>{
    e.preventDefault();
    const t=e.changedTouches[0];
    const dx=t.clientX-tx,dy=t.clientY-ty;
    if(Math.abs(dx)<10&&Math.abs(dy)<10)return; // ignore taps
    if(Math.abs(dx)>Math.abs(dy)){
      if(dx>0&&dir.x!==-1)nd={x:1,y:0};
      else if(dx<0&&dir.x!==1)nd={x:-1,y:0};
    }else{
      if(dy>0&&dir.y!==-1)nd={x:0,y:1};
      else if(dy<0&&dir.y!==1)nd={x:0,y:-1};
    }
  };

  // ONSCREEN BUTTONS
  document.getElementById('ctrl').innerHTML=
    '<button onclick="snakeDir(0,-1)">⬆️</button><br>'+
    '<button onclick="snakeDir(-1,0)">⬅️</button>'+
    '<button onclick="snakeDir(1,0)">➡️</button><br>'+
    '<button onclick="snakeDir(0,1)">⬇️</button>';

  window.snakeDir=(x,y)=>{
    if(x===1&&dir.x!==-1)nd={x:1,y:0};
    if(x===-1&&dir.x!==1)nd={x:-1,y:0};
    if(y===1&&dir.y!==-1)nd={x:0,y:1};
    if(y===-1&&dir.y!==1)nd={x:0,y:-1};
  };

  function tick(){
    if(dead)return;
    dir=nd;
    const h={x:sn[0].x+dir.x,y:sn[0].y+dir.y};
    if(h.x<0||h.x>=C||h.y<0||h.y>=R||sn.some(s=>s.x===h.x&&s.y===h.y)){
      dead=true;toast('🐍 Score: '+sc);return;
    }
    sn.unshift(h);
    if(h.x===food.x&&h.y===food.y){sc+=10;food=mkFood();}else sn.pop();
    hud('🐍 '+sc);
  }

  function draw(){
    ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff6b6b';
    ctx.beginPath();ctx.arc(food.x*SZ+SZ/2,food.y*SZ+SZ/2,SZ/2-2,0,Math.PI*2);ctx.fill();
    sn.forEach((s,i)=>{ctx.fillStyle=i===0?'#6c5ce7':'#a29bfe';rr(ctx,s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2,3);ctx.fill();});
    if(dead){showEnd(cv,'Game Over!','Score: '+sc);onRestart(cv,snakeG);}
  }

  ival=setInterval(tick,100);
  function loop(){draw();if(!dead)anim=requestAnimationFrame(loop);}
  loop();
}

// ===============================================================
//  FLAPPY
// ===============================================================
function flappyG(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  let bird={x:W*.2,y:H/2,vy:0,r:13};
  let pipes=[],sc=0,dead=false,fr=0;

  function jump(){if(!dead)bird.vy=-6.5;}

  document.onkeydown=(e)=>{if(e.code==='Space'){e.preventDefault();jump();}};
  cv.onclick=()=>jump();
  cv.ontouchstart=(e)=>{e.preventDefault();jump();};

  function addP(){const t=50+Math.random()*(H-200);pipes.push({x:W,t,scored:false});}

  function loop(){
    if(!dead){
      fr++;bird.vy+=.32;bird.y+=bird.vy;
      if(bird.y<0||bird.y>H)dead=true;
      if(fr%85===0)addP();
      pipes.forEach(p=>{
        p.x-=2.5;
        if(bird.x+bird.r>p.x&&bird.x-bird.r<p.x+40){
          if(bird.y-bird.r<p.t||bird.y+bird.r>p.t+140)dead=true;
        }
        if(!p.scored&&p.x+40<bird.x){p.scored=true;sc++;}
      });
      pipes=pipes.filter(p=>p.x>-50);
      hud('🐤 '+sc);
    }
    ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
    pipes.forEach(p=>{
      ctx.fillStyle='#00b894';
      ctx.fillRect(p.x,0,40,p.t);ctx.fillRect(p.x,p.t+140,40,H);
    });
    ctx.fillStyle='#fdcb6e';ctx.beginPath();ctx.arc(bird.x,bird.y,bird.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bird.x+4,bird.y-3,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(bird.x+5,bird.y-3,1.8,0,Math.PI*2);ctx.fill();

    if(dead){toast('🐤 Score: '+sc);showEnd(cv,'Game Over!','Score: '+sc);onRestart(cv,flappyG);}
    else anim=requestAnimationFrame(loop);
  }

}

// ===============================================================
//  BREAKOUT
// ===============================================================
function breakoutG(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const PW=75,PH=10;
  let px=W/2-PW/2;
  let b={x:W/2,y:H-40,vx:3,vy:-3,r:6};
  let sc=0,dead=false;
  const cols=6,BW=(W-10)/cols,BH=18;
  const clrs=['#e84393','#fd79a8','#6c5ce7','#a29bfe','#0984e3'];
  let bricks=[];
  for(let r=0;r<5;r++)for(let c=0;c<cols;c++)bricks.push({x:5+c*BW,y:35+r*(BH+3),w:BW-3,h:BH,alive:true,clr:clrs[r]});

  // MOUSE
  cv.onmousemove=(e)=>{const rect=cv.getBoundingClientRect();px=e.clientX-rect.left-PW/2;px=Math.max(0,Math.min(W-PW,px));};
  // TOUCH
  cv.ontouchmove=(e)=>{e.preventDefault();const rect=cv.getBoundingClientRect();px=e.touches[0].clientX-rect.left-PW/2;px=Math.max(0,Math.min(W-PW,px));};
  cv.ontouchstart=(e)=>e.preventDefault();
  // KEYBOARD
  let kl=false,kr=false;
  document.onkeydown=(e)=>{if(e.key==='ArrowLeft')kl=true;if(e.key==='ArrowRight')kr=true;};
  document.onkeyup=(e)=>{if(e.key==='ArrowLeft')kl=false;if(e.key==='ArrowRight')kr=false;};

  function loop(){
    if(kl)px=Math.max(0,px-5);if(kr)px=Math.min(W-PW,px+5);
    if(!dead){
      b.x+=b.vx;b.y+=b.vy;
      if(b.x<b.r||b.x>W-b.r)b.vx*=-1;
      if(b.y<b.r)b.vy*=-1;
      if(b.y>H){dead=true;}
      if(b.vy>0&&b.y+b.r>H-25&&b.x>px&&b.x<px+PW){b.vy=-Math.abs(b.vy);b.vx=((b.x-px-PW/2)/(PW/2))*4;}
      bricks.forEach(br=>{if(!br.alive)return;if(b.x>br.x&&b.x<br.x+br.w&&b.y-b.r<br.y+br.h&&b.y+b.r>br.y){br.alive=false;b.vy*=-1;sc+=10;}});
      if(bricks.every(br=>!br.alive)){dead=true;toast('🎉 Venceu! '+sc);}
      hud('🧱 '+sc);
    }
    ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
    bricks.forEach(br=>{if(!br.alive)return;ctx.fillStyle=br.clr;rr(ctx,br.x,br.y,br.w,br.h,3);ctx.fill();});
    ctx.fillStyle='#6c5ce7';rr(ctx,px,H-25,PW,PH,5);ctx.fill();
    ctx.fillStyle='#fdcb6e';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    if(dead){showEnd(cv,bricks.every(br=>!br.alive)?'Parabéns!':'Game Over!','Score: '+sc);onRestart(cv,breakoutG);}
    else anim=requestAnimationFrame(loop);
  }
  loop();
}

  cv.onmousemove=(e)=>{const rect=cv.getBoundingClientRect();py=e.clientY-rect.top-PH/2;py=Math.max(0,Math.min(H-PH,py));};
  cv.ontouchmove=(e)=>{e.preventDefault();const rect=cv.getBoundingClientRect();py=e.touches[0].clientY-rect.top-PH/2;py=Math.max(0,Math.min(H-PH,py));};
  cv.ontouchstart=(e)=>e.preventDefault();

  function reset(){b.x=W/2;b.y=H/2;b.vx=(Math.random()>.5?3.5:-3.5);b.vy=(Math.random()-.5)*5;}

    if(b.vx>0&&b.x+b.r>W-18-PW&&b.y>ay&&b.y<ay+PH)b.vx=-Math.abs(b.vx)*1.03;

    ctx.fillStyle='#6c5ce7';rr(ctx,15,py,PW,PH,4);ctx.fill();

    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();

}

      bullets.forEach(b=>{enemies.forEach(e=>{if(e.alive&&b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){e.alive=false;b.y=-99;sc+=10;}});});

// ===============================================================
//  TIC TAC TOE
// ===============================================================
function tttG(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const SZ=Math.min(W-30,H*.5),CS=SZ/3,OX=(W-SZ)/2,OY=(H-SZ)/2;
  let board=Array(9).fill(''),turn='X',done=false,winner=null;

  function getIdx(cx,cy){const c=Math.floor((cx-OX)/CS),r=Math.floor((cy-OY)/CS);return(c>=0&&c<3&&r>=0&&r<3)?r*3+c:-1;}
  function check(){
    const L=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for(let[a,b,c]of L)if(board[a]&&board[a]===board[b]&&board[b]===board[c])return board[a];
    return null;
  }
  function ai(){
    const emp=board.map((v,i)=>v===''?i:-1).filter(i=>i>=0);if(!emp.length)return;
    for(let i of emp){board[i]='O';if(check()==='O'){fin();return;}board[i]='';}
    for(let i of emp){board[i]='X';if(check()==='X'){board[i]='O';fin();return;}board[i]='';}
    if(board[4]===''){board[4]='O';fin();return;}
    board[emp[Math.floor(Math.random()*emp.length)]]='O';fin();
  }
  function fin(){winner=check();if(winner||board.every(v=>v))done=true;turn='X';draw();}
  function play(idx){
    if(done||turn!=='X'||board[idx])return;
    board[idx]='X';winner=check();
    if(winner||board.every(v=>v)){done=true;draw();return;}
    turn='O';draw();setTimeout(ai,300);
  }

  cv.onclick=(e)=>{
    if(done){stopAll();tttG(cv);return;}
    const rect=cv.getBoundingClientRect();const idx=getIdx(e.clientX-rect.left,e.clientY-rect.top);if(idx>=0)play(idx);
  };
  cv.ontouchstart=(e)=>{
    e.preventDefault();
    if(done){stopAll();tttG(cv);return;}
    const rect=cv.getBoundingClientRect();const idx=getIdx(e.touches[0].clientX-rect.left,e.touches[0].clientY-rect.top);if(idx>=0)play(idx);
  };

  function draw(){
    ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(108,92,231,.25)';ctx.lineWidth=2;
    for(let i=1;i<3;i++){ctx.beginPath();ctx.moveTo(OX+i*CS,OY);ctx.lineTo(OX+i*CS,OY+SZ);ctx.stroke();ctx.beginPath();ctx.moveTo(OX,OY+i*CS);ctx.lineTo(OX+SZ,OY+i*CS);ctx.stroke();}
    board.forEach((v,i)=>{
      if(!v)return;
      const c=i%3,r=Math.floor(i/3),cx=OX+c*CS+CS/2,cy=OY+r*CS+CS/2,s=CS*.28;
      ctx.lineWidth=4;
      if(v==='X'){ctx.strokeStyle='#6c5ce7';ctx.beginPath();ctx.moveTo(cx-s,cy-s);ctx.lineTo(cx+s,cy+s);ctx.stroke();ctx.beginPath();ctx.moveTo(cx+s,cy-s);ctx.lineTo(cx-s,cy+s);ctx.stroke();}
      else{ctx.strokeStyle='#e84393';ctx.beginPath();ctx.arc(cx,cy,s,0,Math.PI*2);ctx.stroke();}
    });
    ctx.fillStyle='#fff';ctx.font='bold 14px system-ui';ctx.textAlign='center';
    if(done){
      const m=winner?(winner==='X'?'Você venceu!':'IA venceu!'):'Empate!';
      ctx.fillText(m,W/2,OY-12);ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='11px system-ui';ctx.fillText('Toque para jogar novamente',W/2,OY+SZ+25);
    }else ctx.fillText(turn==='X'?'Sua vez':'IA pensando...',W/2,OY-12);
  }
  draw();
}

// ===============================================================
//  MEMORY
// ===============================================================
function memoryG(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const EM=['🐶','🐱','🐼','🦊','🐸','🐵','🐰','🐻'];
  let deck=shuffle([...EM,...EM]);
  const C=4,R=4,CW=(W-24)/C,CH=CW*1.15,OFFY=(H-R*(CH+5))/2;
  let cards=deck.map((e,i)=>({e,c:i%C,r:Math.floor(i/C),flip:false,match:false}));
  let flipped=[],mv=0,pairs=0,lock=false;

  function getCard(cx,cy){
    const tc=Math.floor((cx-12)/(CW+4)),tr=Math.floor((cy-OFFY)/(CH+5));
    return(tc>=0&&tc<C&&tr>=0&&tr<R)?cards[tr*C+tc]:null;
  }

  function click(cx,cy){
    if(lock)return;
    if(pairs===8){stopAll();memoryG(cv);return;}
    const card=getCard(cx,cy);
    if(!card||card.flip||card.match)return;
    card.flip=true;flipped.push(card);draw();
    if(flipped.length===2){
      mv++;lock=true;
      setTimeout(()=>{
        if(flipped[0].e===flipped[1].e){flipped[0].match=true;flipped[1].match=true;pairs++;}
        else{flipped[0].flip=false;flipped[1].flip=false;}
        flipped=[];lock=false;draw();
        hud('🃏 '+pairs+'/8 · '+mv+' moves');
        if(pairs===8){toast('🎉 '+mv+' moves!');showEnd(cv,'Parabéns!',mv+' movimentos');onRestart(cv,memoryG);}
      },500);
    }
  }

  cv.onclick=(e)=>{const rect=cv.getBoundingClientRect();click(e.clientX-rect.left,e.clientY-rect.top);};
  cv.ontouchstart=(e)=>{e.preventDefault();const rect=cv.getBoundingClientRect();click(e.touches[0].clientX-rect.left,e.touches[0].clientY-rect.top);};

  function draw(){
    ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
    hud('🃏 '+pairs+'/8');
    cards.forEach(cd=>{
      const x=12+cd.c*(CW+4),y=OFFY+cd.r*(CH+5);
      if(cd.flip||cd.match){
        ctx.fillStyle=cd.match?'rgba(0,184,148,.15)':'rgba(108,92,231,.12)';rr(ctx,x,y,CW,CH,7);ctx.fill();
        ctx.strokeStyle=cd.match?'#00b894':'#6c5ce7';ctx.lineWidth=1.5;rr(ctx,x,y,CW,CH,7);ctx.stroke();
        ctx.font=Math.floor(CW*.4)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';
        ctx.fillText(cd.e,x+CW/2,y+CH/2);
      }else{
        ctx.fillStyle='#6c5ce7';rr(ctx,x,y,CW,CH,7);ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.12)';ctx.font='bold 16px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('?',x+CW/2,y+CH/2);
      }
    });
  }
  draw();
}

// ===============================================================
//  2048
// ===============================================================
function g2048(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const N=4,P=7,BSZ=Math.min(W-16,H*.55),CSZ=(BSZ-P*(N+1))/N,OX=(W-BSZ)/2,OY=(H-BSZ)/2;
  let grid=Array.from({length:N},()=>Array(N).fill(0)),sc=0,done=false;
  addT();addT();

  const TC={0:'#1a1a2e',2:'#6c5ce7',4:'#a855f7',8:'#e84393',16:'#fd79a8',32:'#e17055',64:'#d63031',128:'#fdcb6e',256:'#f39c12',512:'#00b894',1024:'#00cec9',2048:'#0984e3'};

  function addT(){const e=[];grid.forEach((r,ri)=>r.forEach((v,ci)=>{if(!v)e.push([ri,ci]);}));if(!e.length)return;const[r,c]=e[Math.floor(Math.random()*e.length)];grid[r][c]=Math.random()<.9?2:4;}
  function slide(row){let a=row.filter(v=>v),m=[];for(let i=0;i<a.length;i++){if(i+1<a.length&&a[i]===a[i+1]){m.push(a[i]*2);sc+=a[i]*2;i++;}else m.push(a[i]);}while(m.length<N)m.push(0);return m;}
  function move(dir){
    const old=JSON.stringify(grid);
    if(dir==='l')grid=grid.map(r=>slide(r));
    else if(dir==='r')grid=grid.map(r=>slide([...r].reverse()).reverse());
    else if(dir==='u'){for(let c=0;c<N;c++){let col=grid.map(r=>r[c]);col=slide(col);col.forEach((v,r)=>grid[r][c]=v);}}
    else{for(let c=0;c<N;c++){let col=grid.map(r=>r[c]).reverse();col=slide(col).reverse();col.forEach((v,r)=>grid[r][c]=v);}}
    if(JSON.stringify(grid)!==old){addT();draw();}
    if(!grid.flat().includes(0)){
      let ok=false;
      for(let r=0;r<N;r++)for(let c=0;c<N;c++){if(c+1<N&&grid[r][c]===grid[r][c+1])ok=true;if(r+1<N&&grid[r][c]===grid[r+1][c])ok=true;}
      if(!ok){done=true;toast('🔢 Score: '+sc);draw();}
    }
  }

  // KEYBOARD
  document.onkeydown=(e)=>{
    if(done)return;
    if(e.key==='ArrowLeft'){e.preventDefault();move('l');}
    if(e.key==='ArrowRight'){e.preventDefault();move('r');}
    if(e.key==='ArrowUp'){e.preventDefault();move('u');}
    if(e.key==='ArrowDown'){e.preventDefault();move('d');}
  };

  // TOUCH SWIPE
  let sx=0,sy=0;
  cv.ontouchstart=(e)=>{e.preventDefault();if(done){stopAll();g2048(cv);return;}sx=e.touches[0].clientX;sy=e.touches[0].clientY;};
  cv.ontouchend=(e)=>{
    e.preventDefault();if(done)return;
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.max(Math.abs(dx),Math.abs(dy))<20)return;
    if(Math.abs(dx)>Math.abs(dy))move(dx>0?'r':'l');else move(dy>0?'d':'u');
  };

  function draw(){
    ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
    hud('🔢 '+sc);
    ctx.fillStyle='rgba(108,92,231,.06)';rr(ctx,OX,OY,BSZ,BSZ,8);ctx.fill();
    for(let r=0;r<N;r++)for(let c=0;c<N;c++){
      const x=OX+P+c*(CSZ+P),y=OY+P+r*(CSZ+P),v=grid[r][c];
      ctx.fillStyle=TC[v]||'#0984e3';rr(ctx,x,y,CSZ,CSZ,5);ctx.fill();
      if(v){ctx.fillStyle='#fff';ctx.font=`bold ${v>=1000?12:v>=100?16:20}px system-ui`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(v,x+CSZ/2,y+CSZ/2);}
    }
    if(done){showEnd(cv,'Game Over!','Score: '+sc);onRestart(cv,g2048);}
  }
  draw();
}

// ===============================================================
//  BALLOON POP
// ===============================================================
function balloonG(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  let bs=[],sc=0,miss=0,dead=false,fr=0;
  const CL=['#e84393','#6c5ce7','#00cec9','#fdcb6e','#e17055','#55efc4'];

  function pop(cx,cy){
    for(let i=bs.length-1;i>=0;i--){if(Math.hypot(cx-bs[i].x,cy-bs[i].y)<bs[i].r){bs.splice(i,1);sc+=10;return;}}
  }

  cv.onclick=(e)=>{if(dead){stopAll();balloonG(cv);return;}const rect=cv.getBoundingClientRect();pop(e.clientX-rect.left,e.clientY-rect.top);};
  cv.ontouchstart=(e)=>{e.preventDefault();if(dead){stopAll();balloonG(cv);return;}const rect=cv.getBoundingClientRect();pop(e.touches[0].clientX-rect.left,e.touches[0].clientY-rect.top);};

  function loop(){
    if(!dead){
      fr++;if(fr%22===0)bs.push({x:20+Math.random()*(W-40),y:H+15,r:16+Math.random()*14,vy:-1.3-Math.random()*1.8,c:CL[Math.floor(Math.random()*CL.length)]});
      bs.forEach(b=>b.y+=b.vy);const bf=bs.length;bs=bs.filter(b=>b.y+b.r>-5);miss+=bf-bs.length;
      if(miss>10){dead=true;toast('🎈 Score: '+sc);}
      hud('🎈 '+sc+' | ❌'+miss+'/10');
    }
    ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
    bs.forEach(b=>{ctx.fillStyle=b.c;ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.arc(b.x-b.r*.3,b.y-b.r*.3,b.r*.12,0,Math.PI*2);ctx.fill();});
    if(dead){showEnd(cv,'Game Over!','Score: '+sc);onRestart(cv,balloonG);}
    else anim=requestAnimationFrame(loop);
  }
  loop();
}

// ===============================================================
//  CAR DODGE
// ===============================================================
function carG(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const LW=W/3;let lane=1,en=[],sc=0,dead=false,fr=0,spd=3.5;

  document.onkeydown=(e)=>{if(e.key==='ArrowLeft'&&lane>0){lane--;e.preventDefault();}if(e.key==='ArrowRight'&&lane<2){lane++;e.preventDefault();}};
  cv.ontouchstart=(e)=>{e.preventDefault();if(dead){stopAll();carG(cv);return;}const rect=cv.getBoundingClientRect();const tx=e.touches[0].clientX-rect.left;if(tx<W/2&&lane>0)lane--;else if(tx>=W/2&&lane<2)lane++;};
  cv.onclick=(e)=>{if(dead){stopAll();carG(cv);return;}};

  function loop(){
    if(!dead){
      fr++;sc=Math.floor(fr/5);spd=3.5+sc/70;
      if(fr%Math.max(16,48-Math.floor(sc/7))===0)en.push({l:Math.floor(Math.random()*3),y:-40});
      en.forEach(e=>e.y+=spd);en=en.filter(e=>e.y<H+50);
      en.forEach(e=>{if(e.l===lane&&e.y>H-88&&e.y<H-22){dead=true;toast('🏎️ Score: '+sc);}});
      hud('🏎️ '+sc);
    }
    ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='rgba(108,92,231,.12)';ctx.setLineDash([15,15]);ctx.lineWidth=1.5;
    for(let i=1;i<3;i++){ctx.beginPath();ctx.moveTo(i*LW,0);ctx.lineTo(i*LW,H);ctx.stroke();}ctx.setLineDash([]);
    const px=lane*LW+LW/2;
    ctx.fillStyle='#6c5ce7';rr(ctx,px-14,H-80,28,46,6);ctx.fill();
    ctx.fillStyle='#e84393';en.forEach(e=>{rr(ctx,e.l*LW+LW/2-14,e.y,28,46,6);ctx.fill();});
    if(dead){showEnd(cv,'Crash!','Score: '+sc);onRestart(cv,carG);}
    else anim=requestAnimationFrame(loop);
  }
  loop();
}

// ===============================================================
//  FRUIT CATCH
// ===============================================================
function catchG(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  let bx=W/2,BW=55,fruits=[],sc=0,miss=0,dead=false,fr=0;
  const FE=['🍎','🍊','🍋','🍇','🍓','🍑'];

  cv.onmousemove=(e)=>{const rect=cv.getBoundingClientRect();bx=e.clientX-rect.left;bx=Math.max(BW/2,Math.min(W-BW/2,bx));};
  cv.ontouchmove=(e)=>{e.preventDefault();const rect=cv.getBoundingClientRect();bx=e.touches[0].clientX-rect.left;bx=Math.max(BW/2,Math.min(W-BW/2,bx));};
  cv.ontouchstart=(e)=>{e.preventDefault();if(dead){stopAll();catchG(cv);}};

  function loop(){
    if(!dead){
      fr++;if(fr%28===0)fruits.push({x:12+Math.random()*(W-24),y:-12,e:FE[Math.floor(Math.random()*FE.length)],s:1.8+Math.random()*1.8});
      fruits.forEach(f=>f.y+=f.s);
      fruits=fruits.filter(f=>{
        if(f.y>H-35&&Math.abs(f.x-bx)<BW/2+8){sc+=10;return false;}
        if(f.y>H+10){miss++;return false;}return true;
      });
      if(miss>8){dead=true;toast('🍎 Score: '+sc);}
      hud('🍎 '+sc+' | ❌'+miss+'/8');
    }
    ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#6c5ce7';rr(ctx,bx-BW/2,H-32,BW,15,6);ctx.fill();
    ctx.font='18px serif';ctx.textAlign='center';
    fruits.forEach(f=>ctx.fillText(f.e,f.x,f.y));
    if(dead){showEnd(cv,'Game Over!','Score: '+sc);onRestart(cv,catchG);}
    else anim=requestAnimationFrame(loop);
  }
  loop();
}

// ===============================================================
//  DODGE BALL
// ===============================================================
function dodgeG(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  let pl={x:W/2,y:H-50,r:12};
  let balls=[],sc=0,dead=false,fr=0;

  cv.onmousemove=(e)=>{if(dead)return;const rect=cv.getBoundingClientRect();pl.x=e.clientX-rect.left;pl.y=e.clientY-rect.top;pl.x=Math.max(pl.r,Math.min(W-pl.r,pl.x));pl.y=Math.max(pl.r,Math.min(H-pl.r,pl.y));};
  cv.ontouchmove=(e)=>{e.preventDefault();if(dead)return;const rect=cv.getBoundingClientRect();pl.x=e.touches[0].clientX-rect.left;pl.y=e.touches[0].clientY-rect.top;pl.x=Math.max(pl.r,Math.min(W-pl.r,pl.x));pl.y=Math.max(pl.r,Math.min(H-pl.r,pl.y));};
  cv.ontouchstart=(e)=>{e.preventDefault();if(dead){stopAll();dodgeG(cv);}};
  cv.onclick=()=>{if(dead){stopAll();dodgeG(cv);}};

  function loop(){
    if(!dead){
      fr++;sc=Math.floor(fr/5);
      if(fr%18===0){
        const s=Math.floor(Math.random()*4);let bx,by,vx,vy;
        if(s===0){bx=Math.random()*W;by=-8;vx=(Math.random()-.5)*3;vy=2+Math.random()*2;}
        else if(s===1){bx=Math.random()*W;by=H+8;vx=(Math.random()-.5)*3;vy=-2-Math.random()*2;}
        else if(s===2){bx=-8;by=Math.random()*H;vx=2+Math.random()*2;vy=(Math.random()-.5)*3;}
        else{bx=W+8;by=Math.random()*H;vx=-2-Math.random()*2;vy=(Math.random()-.5)*3;}
        balls.push({x:bx,y:by,vx,vy,r:5+Math.random()*8});
      }
      balls.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
      balls=balls.filter(b=>b.x>-25&&b.x<W+25&&b.y>-25&&b.y<H+25);
      balls.forEach(b=>{if(Math.hypot(b.x-pl.x,b.y-pl.y)<b.r+pl.r){dead=true;toast('⚡ Score: '+sc);}});
      hud('⚡ '+sc);
    }
    ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#6c5ce7';ctx.beginPath();ctx.arc(pl.x,pl.y,pl.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e84393';balls.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();});
    if(dead){showEnd(cv,'Game Over!','Score: '+sc);onRestart(cv,dodgeG);}
    else anim=requestAnimationFrame(loop);
  }
  loop();
}

// ===============================================================
//  STACK TOWER
// ===============================================================
function stackG(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const BH=20;
  let blocks=[{x:W/2-50,w:100}],cur={x:0,w:100,spd:2.5,dir:1},sc=0,dead=false,scrollY=0;
  const CL=['#6c5ce7','#a855f7','#e84393','#fd79a8','#00cec9','#55efc4','#fdcb6e','#e17055','#0984e3'];

  function place(){
    const top=blocks[blocks.length-1];
    const os=Math.max(cur.x,top.x),oe=Math.min(cur.x+cur.w,top.x+top.w),ow=oe-os;
    if(ow<=2){dead=true;toast('🏗️ Height: '+sc);return;}
    blocks.push({x:os,w:ow});cur.x=os;cur.w=ow;cur.spd+=.12;sc++;
    if(blocks.length*BH>H*.55)scrollY+=BH;
    hud('🏗️ '+sc);
  }

  document.onkeydown=(e)=>{if(e.code==='Space'){e.preventDefault();if(dead){stopAll();stackG(cv);}else place();}};
  cv.onclick=()=>{if(dead){stopAll();stackG(cv);}else place();};
  cv.ontouchstart=(e)=>{e.preventDefault();if(dead){stopAll();stackG(cv);}else place();};

  function loop(){
    if(!dead){cur.x+=cur.spd*cur.dir;if(cur.x+cur.w>W)cur.dir=-1;if(cur.x<0)cur.dir=1;}
    ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
    blocks.forEach((b,i)=>{const y=H-20-(i+1)*BH+scrollY;ctx.fillStyle=CL[i%CL.length];rr(ctx,b.x,y,b.w,BH-2,2);ctx.fill();});
    if(!dead){const y=H-20-(blocks.length+1)*BH+scrollY;ctx.fillStyle=CL[blocks.length%CL.length];rr(ctx,cur.x,y,cur.w,BH-2,2);ctx.fill();}
    if(dead){showEnd(cv,'Game Over!','Height: '+sc);onRestart(cv,stackG);}
    else anim=requestAnimationFrame(loop);
  }
  loop();
}

// ===============================================================
//  TARGET SHOOT
// ===============================================================
function shooterG(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  let targets=[],sc=0,time=22,dead=false,fr=0;

  const ti=setInterval(()=>{if(dead){clearInterval(ti);return;}time--;if(time<=0){dead=true;toast('🎯 Score: '+sc);}},1000);

  function hit(cx,cy){
    for(let i=targets.length-1;i>=0;i--){if(Math.hypot(cx-targets[i].x,cy-targets[i].y)<targets[i].r){sc+=Math.ceil(25/targets[i].r)*10;targets.splice(i,1);return;}}
  }

  cv.onclick=(e)=>{if(dead){stopAll();shooterG(cv);return;}const rect=cv.getBoundingClientRect();hit(e.clientX-rect.left,e.clientY-rect.top);};
  cv.ontouchstart=(e)=>{e.preventDefault();if(dead){stopAll();shooterG(cv);return;}const rect=cv.getBoundingClientRect();hit(e.touches[0].clientX-rect.left,e.touches[0].clientY-rect.top);};

  function loop(){
    if(!dead){
      fr++;if(fr%35===0&&targets.length<6)targets.push({x:25+Math.random()*(W-50),y:35+Math.random()*(H-70),r:14+Math.random()*18,life:100+Math.random()*50});
      targets.forEach(t=>t.life--);targets=targets.filter(t=>t.life>0);
      hud('🎯 '+sc+' | ⏱️'+time);
    }
    ctx.fillStyle='#0d1117';ctx.fillRect(0,0,W,H);
    targets.forEach(t=>{
      ctx.strokeStyle='#e84393';ctx.lineWidth=2;ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(t.x,t.y,t.r*.55,0,Math.PI*2);ctx.stroke();
      ctx.fillStyle='#e84393';ctx.beginPath();ctx.arc(t.x,t.y,t.r*.2,0,Math.PI*2);ctx.fill();
    });
    if(dead){showEnd(cv,'Tempo!','Score: '+sc);onRestart(cv,shooterG);}
    else anim=requestAnimationFrame(loop);
  }
  targets.push({x:W/2,y:H/3,r:22,life:120});
  loop();
}

// ============ UTIL ============
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
