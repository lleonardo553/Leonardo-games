<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Auto Scroll Controller</title>

<style>
body {
  font-family: Arial;
  background: #111;
  color: white;
  text-align: center;
  padding-top: 50px;
}

input, select, button {
  padding: 12px;
  margin: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<h2>Auto Scroll (Controle)</h2>

<input type="number" id="tempo" placeholder="Tempo (segundos)"><br>

<select id="direcao">
  <option value="down">Baixo</option>
  <option value="up">Cima</option>
</select><br>

<button onclick="enviar()">Iniciar</button>

<script>
function enviar() {
  let tempo = document.getElementById("tempo").value;
  let direcao = document.getElementById("direcao").value;

  // Comunicação com app Android
  if (window.Android) {
    Android.startScroll(tempo, direcao);
  } else {
    alert("Isso só funciona no app!");
  }
}
</script>

</body>
</html>
